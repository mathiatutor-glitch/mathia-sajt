<title>Mathia Student Planner тАФ by Dr. Marina Bulat</title>
<meta name="description" content="Digitalni akademski sistem: od prvog dana fakulteta do diplome. Planiranje, pra─Зenje u─Нenja, navike, ispiti, portfolio i vodi─Н kroz studije.">

<style>
  :root{
    --bg:#FBF6EE;--bg2:#F1E7D7;--card:#FFFDF8;--ink:#3a2d36;--muted:#9a8a90;--line:#EDE3D4;
    --plum:#432C37;--plum2:#5C3B49;--gold:#C6A05C;--golddk:#9C7838;--goldlt:#E7D2A2;--champ:#F7EAC9;--rose:#CC8E86;--rose-dk:#B5746C;
    --mint:#8FB99B;--sky:#86A7C6;--lilac:#A99BC4;--sun:#E7C063;
    --ok:#5fa978;--warn:#d99a4e;--bad:#cc7d76;
    --rad:18px;--sh:0 1px 2px rgba(120,90,50,.05),0 16px 36px -22px rgba(120,90,50,.32);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:'Nunito',system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--bg);background-image:radial-gradient(1200px 620px at 100% -8%,rgba(231,210,162,.20),transparent 60%),radial-gradient(900px 520px at -8% 112%,rgba(204,142,134,.10),transparent 55%);background-attachment:fixed;line-height:1.55;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4{font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;line-height:1.1;margin:0}
  a{color:var(--golddk);text-decoration:none}
  .serif{font-family:'Cormorant Garamond',serif}
  /* layout */
  .app{display:grid;grid-template-columns:262px 1fr;min-height:100vh}
  .side{background:linear-gradient(180deg,#3c2733,#2e1d27);color:#f3e9da;position:sticky;top:0;height:100vh;overflow-y:auto;padding:0 0 30px}
  .side::-webkit-scrollbar{width:7px}.side::-webkit-scrollbar-thumb{background:rgba(231,210,162,.25);border-radius:9px}
  .brand{padding:20px 22px 16px;border-bottom:1px solid rgba(231,210,162,.18);position:sticky;top:0;background:linear-gradient(180deg,#3c2733,#352230);z-index:2}
  .brand b{font-family:'Cormorant Garamond',serif;font-size:1.34rem;letter-spacing:.02em;display:block;color:#fff}
  .brand .by{font-family:'Pinyon Script',cursive;font-size:1.32rem;letter-spacing:.01em;text-transform:none;color:var(--goldlt);margin-top:5px;font-weight:400}
  .navgrp{padding:14px 14px 2px}
  .navgrp .gt{font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(231,210,162,.55);font-weight:800;padding:0 10px 6px}
  .navi{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:11px;cursor:pointer;color:#e9ddcf;font-weight:600;font-size:.88rem;transition:background .14s,transform .08s}
  .navi:hover{background:rgba(231,210,162,.1)}
  .navi.on{background:linear-gradient(100deg,rgba(198,160,92,.95),rgba(156,120,56,.9));color:#3a2a12;box-shadow:0 6px 16px -8px rgba(0,0,0,.5)}
  .navi .ic{width:22px;text-align:center;font-size:1.02rem;flex:0 0 22px}
  /* main */
  .main{padding:0 0 60px;min-width:0}
  .top{position:sticky;top:0;z-index:5;background:rgba(251,246,238,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:12px 30px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .top .mt{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--plum);font-weight:600;flex:1;min-width:160px}
  .savei{font-size:.74rem;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:6px}
  .savei .dot{width:8px;height:8px;border-radius:50%;background:var(--ok)}
  .tbtn{border:1.4px solid var(--line);background:var(--card);color:var(--plum2);border-radius:10px;padding:7px 13px;font-family:inherit;font-weight:700;font-size:.8rem;cursor:pointer;transition:.14s;display:inline-flex;gap:6px;align-items:center}
  .tbtn:hover{border-color:var(--gold);background:#fffdf8}
  .tbtn.danger:hover{border-color:var(--bad);color:var(--bad)}
  .wrap{max-width:980px;margin:0 auto;padding:26px 30px}
  .banner{background:linear-gradient(100deg,#FCF4E4,#F8EBD2 58%,#F7E7E1);border:1px solid var(--goldlt);border-radius:var(--rad);padding:15px 22px;margin-bottom:22px;display:flex;align-items:center;gap:14px;color:var(--plum);box-shadow:0 16px 34px -26px rgba(198,160,92,.75)}
  .banner .q{font-family:'Cormorant Garamond',serif;font-size:1.32rem;font-weight:600;font-style:italic}
  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--rad);box-shadow:var(--sh);padding:20px 22px;margin-bottom:18px}
  .card>h3{font-size:1.45rem;color:var(--plum);margin-bottom:4px;display:flex;align-items:center;gap:9px}
  .card .desc{color:var(--muted);font-size:.86rem;margin-bottom:14px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px 16px}
  @media(max-width:680px){.grid2,.grid3{grid-template-columns:1fr}}
  label.f{display:block;margin-bottom:2px}
  label.f .l{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--golddk);font-weight:800;display:block;margin-bottom:4px}
  input.t,select.t,textarea.t{width:100%;border:1.4px solid var(--line);background:#fcfbf9;border-radius:11px;padding:9px 12px;font-family:inherit;font-size:.92rem;color:var(--ink);transition:.14s;resize:none}
  input.t:focus,select.t:focus,textarea.t:focus{outline:none;border-color:var(--gold);background:#fff;box-shadow:0 0 0 3px rgba(198,160,92,.13)}
  textarea.t{line-height:1.6;min-height:46px;overflow:hidden}
  .hint{font-size:.78rem;color:var(--muted);margin-top:3px}
  /* tables */
  .tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:.88rem}
  .tbl th{text-align:left;font-size:.68rem;letter-spacing:.07em;text-transform:uppercase;color:var(--golddk);font-weight:800;padding:0 8px 7px}
  .tbl td{padding:4px 6px;vertical-align:top}
  .tbl input.t,.tbl select.t,.tbl textarea.t{padding:7px 9px;font-size:.86rem;border-radius:9px}
  .tbl tr+tr td{padding-top:7px}
  .rowdel{border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:1.1rem;line-height:1;padding:6px 4px;border-radius:8px}
  .rowdel:hover{color:var(--bad);background:#fbeeee}
  .addbtn{margin-top:10px;border:1.4px dashed var(--goldlt);background:#fffdf6;color:var(--golddk);border-radius:11px;padding:9px 14px;font-family:inherit;font-weight:800;font-size:.83rem;cursor:pointer;transition:.14s;width:100%}
  .addbtn:hover{border-color:var(--gold);background:#fdf6e8}
  /* chips / checklist */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chk{display:inline-flex;align-items:center;gap:8px;border:1.4px solid var(--line);background:#fcfbf9;border-radius:100px;padding:7px 14px;font-weight:700;font-size:.85rem;cursor:pointer;color:var(--plum2);transition:.14s;user-select:none}
  .chk:hover{border-color:var(--gold)}
  .chk.on{background:linear-gradient(100deg,#eaf6ee,#dff0e6);border-color:#aed7bd;color:#2f6b46}
  .chk .bx{width:17px;height:17px;border-radius:6px;border:2px solid #cbb9c2;display:inline-flex;align-items:center;justify-content:center;font-size:.72rem;color:#fff}
  .chk.on .bx{background:var(--ok);border-color:var(--ok)}
  /* progress */
  .bar{height:11px;background:var(--bg2);border-radius:100px;overflow:hidden}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--goldlt),var(--gold));border-radius:100px;transition:width .3s}
  .stat{display:flex;flex-direction:column;gap:2px;background:#faf8f4;border:1px solid var(--line);border-radius:13px;padding:13px 15px}
  .stat .n{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:700;color:var(--plum);line-height:1}
  .stat .k{font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:800}
  /* misc widgets */
  .ring{--p:0;width:128px;height:128px;border-radius:50%;background:conic-gradient(var(--gold) calc(var(--p)*1%),var(--bg2) 0);display:flex;align-items:center;justify-content:center}
  .ring .in{width:98px;height:98px;border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .in b{font-family:'Cormorant Garamond',serif;font-size:1.9rem;color:var(--plum)}
  .pomo{display:flex;flex-direction:column;align-items:center;gap:14px;padding:8px 0}
  .pomo .time{font-family:'Cormorant Garamond',serif;font-size:4.4rem;color:var(--plum);font-weight:700;letter-spacing:.02em}
  .pomo .ctl{display:flex;gap:10px}
  .bigbtn{border:none;border-radius:100px;padding:12px 30px;font-family:inherit;font-weight:800;font-size:.95rem;cursor:pointer;transition:.16s;box-shadow:0 10px 24px -12px rgba(198,160,92,.8)}
  .bigbtn.g{background:linear-gradient(180deg,#EBD49A,var(--gold));color:#4a3812}
  .bigbtn.o{background:#fff;border:1.5px solid var(--line);color:var(--plum2);box-shadow:none}
  .bigbtn:hover{transform:translateY(-2px)}
  .tom{font-size:1.5rem;letter-spacing:3px}
  .week{display:grid;grid-template-columns:1.4fr repeat(7,1fr);gap:6px;align-items:center;font-size:.82rem}
  .week .hd{font-size:.66rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:800;text-align:center}
  .cell{aspect-ratio:1;border-radius:9px;border:1.6px solid var(--line);background:#fcfbf9;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:.12s}
  .cell.on{background:linear-gradient(120deg,var(--gold),var(--goldlt));border-color:var(--gold);color:#fff}
  .moodc{width:42px;height:42px;border-radius:50%;border:2px solid var(--line);background:#fcfbf9;display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;transition:.12s}
  .moodc:hover{border-color:var(--gold)}
  .badge{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:14px;padding:12px 14px;background:#fbfaf7;cursor:pointer;transition:.16s;opacity:.55;filter:grayscale(.7)}
  .badge.on{opacity:1;filter:none;background:linear-gradient(110deg,#fff7e6,#fdeecb);border-color:var(--goldlt);box-shadow:0 10px 22px -14px rgba(198,160,92,.7)}
  .badge .e{font-size:1.7rem}
  .badge b{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--plum);display:block}
  .badge small{color:var(--muted)}
  .stik{font-size:1.9rem;cursor:pointer;width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--line);background:#fcfbf9;transition:.12s;position:relative}
  .stik:hover{transform:translateY(-2px) rotate(-4deg);border-color:var(--gold)}
  .stik .cnt{position:absolute;top:-7px;right:-7px;background:var(--rose);color:#fff;font-family:'Nunito';font-size:.68rem;font-weight:800;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
  .subtab{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .subtab .st{border:1.4px solid var(--line);background:#fcfbf9;border-radius:100px;padding:7px 15px;font-weight:800;font-size:.85rem;cursor:pointer;color:var(--plum2);transition:.14s}
  .subtab .st:hover{border-color:var(--gold)}
  .subtab .st.on{background:var(--plum);color:#fff;border-color:var(--plum)}
  .pill{display:inline-block;font-size:.7rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:3px 10px;border-radius:100px;background:#f1ece6;color:var(--golddk)}
  .vimg{width:100%;border-radius:13px;border:1px solid var(--line);margin-top:8px;display:block}
  .guide h4{font-size:1.2rem;color:var(--plum);margin:16px 0 4px}
  .guide p{margin:0 0 8px;color:#4a3f4a}
  .guide ul{margin:0 0 10px;padding-left:20px;color:#4a3f4a}
  .guide li{margin:3px 0}
  .miniad{display:none}
  @media(max-width:860px){
    .app{grid-template-columns:1fr}
    .side{position:fixed;left:0;top:0;width:84%;max-width:300px;transform:translateX(-103%);transition:transform .22s;z-index:60;box-shadow:0 0 60px rgba(0,0,0,.4)}
    .side.open{transform:none}
    .miniad{display:inline-flex}
    .scrim{position:fixed;inset:0;background:rgba(20,12,18,.4);z-index:55;opacity:0;pointer-events:none;transition:.2s}
    .scrim.on{opacity:1;pointer-events:auto}
  }
  @media print{
    .side,.top,.banner,.addbtn,.rowdel,.tbtn,.scrim{display:none!important}
    .app{display:block}.wrap{max-width:100%}
    .card{break-inside:avoid;box-shadow:none;border:1px solid #ddd}
    body{background:#fff}
  }
</style>

<script>
"use strict";
/* ---------------- storage ---------------- */
const KEY='mathia_student_planner_v1';
let DB={};
const store={
  load(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):null}catch(e){return null}},
  save(o){try{localStorage.setItem(KEY,JSON.stringify(o))}catch(e){}}
};
function defaults(){
  return {
    profil:{ime:'',foto:'',indeks:'',fakultet:'',univerzitet:'',smer:'',godina:'',akademska:'',email:'',telefon:'',mentor:'',cilj:'',zasto:''},
    vizija:{prosek:'',espb:'',stipendija:'',erasmus:'',razmena:'',rad:'',master:'',doktorat:''},
    cv:{tekst:'',naucio:''},
    portfolio:{github:'',linkedin:'',sajt:'',projekti:'',certifikati:''},
    godisnji:[],
    rasporedSem:'Zimski semestar',
    raspored:[],
    rok:[],
    sumarum:{polozeno:'',prosek:'',espb:'',najtezi:'',najlaksi:'',ponos:'',menjam:''},
    godine:[{naziv:'Prva godina',prosek:'',espb:'',polozeno:''},{naziv:'Druga godina',prosek:'',espb:'',polozeno:''},{naziv:'Tre─Зa godina',prosek:'',espb:'',polozeno:''},{naziv:'─Мetvrta godina',prosek:'',espb:'',polozeno:''},{naziv:'Master',prosek:'',espb:'',polozeno:''}],
    diploma:{ukupno:'40',polozeno:'0',datum:''},
    refleksija:{naucio:'',drugacije:'',ponos:'',profesor:'',sledece:''},
    subjects:[],
    curSub:0,
    ucenje:[],
    pomodoro:{count:0,minuta:0},
    habits:[
      {name:'U─Нio',days:[false,false,false,false,false,false,false]},
      {name:'Ve┼╛bao zadatke',days:[false,false,false,false,false,false,false]},
      {name:'Pro─Нitao literaturu',days:[false,false,false,false,false,false,false]},
      {name:'Naspavao se',days:[false,false,false,false,false,false,false]},
      {name:'Dovoljno vode',days:[false,false,false,false,false,false,false]},
      {name:'Trening',days:[false,false,false,false,false,false,false]}
    ],
    mood:Array(14).fill(-1),
    finansije:[],
    projekti:[],
    praksa:[],
    konferencije:[],
    bucket:{'Erasmus':false,'Studentska razmena':false,'Objavljen rad':false,'Konferencija':false,'Praksa':false,'Diplomiranje':false},
    vision:{note:'',imgs:['','','']},
    stickers:{},
    stikTabla:'',
    badges:[
      {e:'ЁЯПЕ',name:'Prvi polo┼╛en ispit',on:false},
      {e:'ЁЯеЗ',name:'Sve desetke u roku',on:false},
      {e:'ЁЯФе',name:'30 dana bez pauze',on:false},
      {e:'тШХ',name:'100 sati u─Нenja',on:false},
      {e:'ЁЯОУ',name:'Polo┼╛en najte┼╛i predmet',on:false},
      {e:'ЁЯУЪ',name:'Zavr┼бena godina',on:false},
      {e:'ЁЯПЖ',name:'Prosek preko 9',on:false},
      {e:'тнР',name:'Dekanova nagrada',on:false}
    ]
  };
}
function migrate(d){const def=defaults();for(const k in def){if(!(k in d))d[k]=def[k];}return d;}

/* ---------------- path get/set ---------------- */
function get(p){let o=DB;for(const seg of String(p).split('.')){if(o==null)return undefined;o=o[seg];}return o;}
function set(p,v){const segs=String(p).split('.');let o=DB;for(let i=0;i<segs.length-1;i++){const s=segs[i];if(o[s]==null)o[s]=/^\d+$/.test(segs[i+1])?[]:{};o=o[s];}o[segs[segs.length-1]]=v;}
let saveT=null;
function flag(t){const e=document.getElementById('savetxt');e.textContent=t;}
function save(){store.save(DB);flag('─МuvamтАж');clearTimeout(saveT);saveT=setTimeout(()=>flag('Sa─Нuvano'),500);}

/* ---------------- helpers ---------------- */
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function field(label,path,opt={}){
  const v=esc(get(path));
  if(opt.area)return `<label class="f"><span class="l">${label}</span><textarea class="t" data-path="${path}" rows="2" placeholder="${opt.ph||''}">${v}</textarea></label>`;
  if(opt.sel)return `<label class="f"><span class="l">${label}</span><select class="t" data-path="${path}">${opt.sel.map(o=>`<option ${o===get(path)?'selected':''}>${o}</option>`).join('')}</select></label>`;
  return `<label class="f"><span class="l">${label}</span><input class="t" data-path="${path}" value="${v}" placeholder="${opt.ph||''}" ${opt.type?`type="${opt.type}"`:''}></label>`;
}
function tableEditor(arrPath,cols,addLabel){
  const arr=get(arrPath)||[];
  let h='<div style="overflow-x:auto"><table class="tbl"><tr>'+cols.map(c=>`<th>${c.label}</th>`).join('')+'<th></th></tr>';
  arr.forEach((row,i)=>{
    h+='<tr>'+cols.map(c=>{
      const p=`${arrPath}.${i}.${c.key}`;
      if(c.sel)return `<td><select class="t" data-path="${p}">${c.sel.map(o=>`<option ${o===row[c.key]?'selected':''}>${o}</option>`).join('')}</select></td>`;
      if(c.area)return `<td><textarea class="t" data-path="${p}" rows="1">${esc(row[c.key])}</textarea></td>`;
      return `<td><input class="t" data-path="${p}" value="${esc(row[c.key])}" ${c.type?`type="${c.type}"`:''} placeholder="${c.ph||''}"></td>`;
    }).join('')+`<td><button class="rowdel" data-act="del" data-arr="${arrPath}" data-idx="${i}" title="Obri┼бi">тЬХ</button></td></tr>`;
  });
  h+='</table></div>';
  const tpl=encodeURIComponent(JSON.stringify(cols.reduce((a,c)=>(a[c.key]=c.def||'',a),{})));
  h+=`<button class="addbtn" data-act="add" data-arr="${arrPath}" data-tpl="${tpl}">+ ${addLabel||'Dodaj red'}</button>`;
  return h;
}

/* ---------------- nav + render ---------------- */
let curIdx=0;
function buildNav(){
  const groups=[];const seen={};
  SECTIONS.forEach(s=>{if(!seen[s.grp]){seen[s.grp]=[];groups.push(s.grp);}seen[s.grp].push(s);});
  let h='';
  groups.forEach(g=>{
    h+=`<div class="navgrp"><div class="gt">${g}</div>`;
    seen[g].forEach(s=>{const i=SECTIONS.indexOf(s);h+=`<div class="navi" data-i="${i}"><span class="ic">${s.ic}</span>${s.t}</div>`;});
    h+='</div>';
  });
  document.getElementById('nav').innerHTML=h;
  document.querySelectorAll('.navi').forEach(n=>n.addEventListener('click',()=>{go(+n.dataset.i);toggleSide(false);}));
}
function go(i){curIdx=i;document.querySelectorAll('.navi').forEach(n=>n.classList.toggle('on',+n.dataset.i===i));renderCurrent();window.scrollTo(0,0);}
function renderCurrent(){
  const s=SECTIONS[curIdx];
  document.getElementById('mtitle').textContent=s.ic+'  '+s.t;
  document.getElementById('content').innerHTML=s.r();
  document.querySelectorAll('#content textarea.t').forEach(autosize);
}
function rotateMotiv(){document.getElementById('motiv').textContent=MOTIV[Math.floor(Math.random()*MOTIV.length)];}

/* ---------------- events ---------------- */
document.getElementById('content').addEventListener('input',e=>{
  const t=e.target;
  if(t.dataset.path){
    let v=t.value;
    set(t.dataset.path,v);save();
    if(t.tagName==='TEXTAREA')autosize(t);
    // live update bars/rings without losing focus: only for range
    if(t.dataset.act==='range'){const bar=t.parentElement.querySelector('.bar>i');if(bar)bar.style.width=v+'%';const hb=t.parentElement.querySelector('.hint b');if(hb)hb.textContent=v+'%';}
  }
});
document.getElementById('content').addEventListener('click',e=>{
  const b=e.target.closest('[data-act]');if(!b)return;
  const act=b.dataset.act;
  if(act==='add'){const arr=get(b.dataset.arr)||[];arr.push(JSON.parse(decodeURIComponent(b.dataset.tpl)));set(b.dataset.arr,arr);save();renderCurrent();}
  else if(act==='del'){const arr=get(b.dataset.arr)||[];arr.splice(+b.dataset.idx,1);save();renderCurrent();}
  else if(act==='chk'){const o=get(b.dataset.obj)||{};o[b.dataset.k]=!o[b.dataset.k];set(b.dataset.obj,o);save();renderCurrent();}
  else if(act==='habit'){DB.habits[+b.dataset.i].days[+b.dataset.d]=!DB.habits[+b.dataset.i].days[+b.dataset.d];save();renderCurrent();}
  else if(act==='mood'){const i=+b.dataset.i;DB.mood[i]=((DB.mood[i]==null?-1:DB.mood[i])+1)%5;save();renderCurrent();}
  else if(act==='badge'){DB.badges[+b.dataset.i].on=!DB.badges[+b.dataset.i].on;save();renderCurrent();}
  else if(act==='stik'){const e2=b.dataset.e;DB.stickers[e2]=(DB.stickers[e2]||0)+1;save();renderCurrent();}
  else if(act==='subsel'){DB.curSub=+b.dataset.idx;save();renderCurrent();}
  else if(act==='subadd'){DB.subjects.push({name:'',prof:'',asistent:'',kabinet:'',email:'',konsultacije:'',espb:'',literatura:'',checklist:{},kolokvijumi:[],ispiti:[],poneti:{},formule:'',definicije:'',greske:'',pitanja:'',ponovo:'',napredak:0});DB.curSub=DB.subjects.length-1;save();renderCurrent();}
  else if(act==='subdel'){if(confirm('Obrisati ovaj predmet?')){DB.subjects.splice(+b.dataset.idx,1);DB.curSub=0;save();renderCurrent();}}
  else if(act==='pstart'){pRun=!pRun;if(pRun){pTimer=setInterval(pTick,1000);}else{clearInterval(pTimer);}renderCurrent();}
  else if(act==='preset'){pRun=false;clearInterval(pTimer);pMode='rad';pLeft=25*60;renderCurrent();}
});

function impData(ev){

}
function resetAll(){if(confirm('Obrisati SVE podatke i po─Нeti iznova? Ovo se ne mo┼╛e poni┼бtiti.')){DB=defaults();save();go(0);}}

(function init(){

  setInterval(rotateMotiv,16000);
