  .brand{font-family:'Baloo 2',cursive;font-weight:800;font-size:20px;color:var(--teal)}
  .top .sp{flex:1}
  .plang{background:#fff;border:1px solid #C8E9E0;border-radius:10px;font-family:inherit;font-weight:700;font-size:14px;color:var(--teal);padding:8px 10px;cursor:pointer}
  .back{font-weight:700;font-size:14px;color:var(--teal);text-decoration:none;border:1px solid #C8E9E0;background:#fff;border-radius:10px;padding:8px 13px}
  .back:hover{background:#F0FAF7}

  .wrap{max-width:980px;margin:0 auto;padding:16px 22px 130px}
  .hero{padding:34px 0 8px}
  .badge{display:inline-block;background:#E7F7F2;color:var(--teal);border:1px solid #C8E9E0;border-radius:999px;padding:6px 14px;font-weight:700;font-size:13px}
  h1{font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(34px,6vw,54px);line-height:1.06;margin:18px 0 12px}
  h1 .hl{color:var(--teal)}
  .lead{font-size:18px;line-height:1.65;color:var(--muted);max-width:640px}
  .cta{margin-top:24px;display:inline-flex;align-items:center;gap:10px;background:var(--teal);color:#fff;font-weight:800;font-family:'Baloo 2',cursive;font-size:17px;border:none;border-radius:14px;padding:13px 20px;cursor:pointer;box-shadow:0 10px 26px rgba(20,80,70,.22)}
  .cta:hover{background:#176f60}

  h2{font-family:'Baloo 2',cursive;font-weight:700;font-size:24px;margin:46px 0 16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px}
  .card h3{font-family:'Baloo 2',cursive;margin:0 0 8px;font-size:19px}
  .card p{margin:0;color:var(--muted);font-size:14.5px;line-height:1.55}

  .areas{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px}
  .area{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 14px}
  .area .at{display:block;font-weight:700;font-size:14px}
  .area .as{display:block;font-weight:600;font-size:12px;color:var(--muted);margin-top:2px}

  .levels{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px}
  .lvl{flex:1;min-width:200px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px}
  .lvl b{font-family:'Baloo 2',cursive;font-size:17px}
  .lvl.o b{color:#2FB7A0}.lvl.s b{color:#1F8A78}.lvl.n b{color:#C77B3A}
  .lvl p{margin:6px 0 0;color:var(--muted);font-size:14px;line-height:1.5}

  .steps{counter-reset:s;display:grid;gap:12px;margin-top:4px}
  .step{display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .step::before{counter-increment:s;content:counter(s);flex:none;width:30px;height:30px;border-radius:50%;background:var(--teal);color:#fff;font-family:'Baloo 2',cursive;font-weight:700;display:grid;place-items:center}
  .step p{margin:0;font-size:15px;line-height:1.5}

  .langbar{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .lang{background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px 11px;font-size:13px;font-weight:700;color:#3a4a45}

  .arrow{position:fixed;right:96px;bottom:34px;font-family:'Baloo 2',cursive;font-weight:700;color:var(--teal);background:#fff;border:1px solid #C8E9E0;border-radius:12px;padding:8px 12px;box-shadow:0 8px 20px rgba(20,80,70,.18);z-index:1000}
  @media(max-width:560px){.arrow{display:none}}

  footer{max-width:980px;margin:0 auto;padding:24px 22px 60px;color:var(--muted);font-size:13.5px;border-top:1px solid var(--line)}
</style>
</head>

  function syncWidget(code){
    try {
      var zl = document.getElementById('zoi-lang');
      if (zl && zl.value !== code) { zl.value = code; zl.dispatchEvent(new Event('change')); }
    } catch (e) {}
  }
  function applyLang(code){
    var d = I18N[code] || I18N.sr;
    for (var k in d){ var el = document.getElementById(k); if (el) el.innerHTML = d[k]; }
    document.documentElement.lang = code;
    syncWidget(code);
  }

  document.getElementById('yr').textContent = new Date().getFullYear();
  document.getElementById('cta').onclick = function(){
    var b = document.getElementById('zoi-btn'); if (b) b.click();
  };
  var plang = document.getElementById('plang');
  plang.onchange = function(){ applyLang(plang.value); };
  applyLang(plang.value);
  </script>
