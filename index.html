<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zoi · MathIA</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#FBF6EE; --ink:#2C2620; --soft:#6B6256; --accent:#C75B39; --accentSoft:#F0E0D6; --line:#E7DDCD; --card:#FFFDF9; }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Nunito',sans-serif;display:flex;flex-direction:column;height:100vh}
  header{background:var(--card);border-bottom:1px solid var(--line);padding:14px 18px 10px;position:sticky;top:0;z-index:5}
  .row{display:flex;align-items:center;gap:12px}
  .between{justify-content:space-between}
  .avatar{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid var(--accentSoft);flex-shrink:0}
  .avatar.sm{width:28px;height:28px;border-width:1px}
  .name{font-family:'Fraunces',serif;font-size:19px;font-weight:600;line-height:1.1}
  .sub{font-size:12px;color:var(--soft);font-weight:700}
  .iconbtn{border:1px solid var(--line);background:var(--bg);border-radius:12px;padding:8px 11px;font-size:15px;cursor:pointer;font-family:inherit;font-weight:700;color:var(--ink)}
  .iconbtn.on{background:var(--accentSoft)}
  .tabs{display:flex;gap:6px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:4px;margin-top:10px}
  .tab{flex:1;padding:9px 10px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:800;background:transparent;color:var(--soft)}
  .tab.active{background:var(--accent);color:#fff}
  #chat{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:12px}
  .msg{display:flex;align-items:flex-end;gap:8px;animation:pop .25s ease both}
  .msg.user{justify-content:flex-end}
  .bubble{max-width:80%;padding:11px 14px;border-radius:16px;font-size:15px;line-height:1.5;white-space:pre-wrap}
  .bubble.bot{background:var(--card);border:1px solid var(--line);border-bottom-left-radius:4px}
  .bubble.me{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
  .bubble img{display:block;max-width:100%;border-radius:10px;margin-bottom:8px}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
  @keyframes ring{0%{box-shadow:0 0 0 0 rgba(199,91,57,.45)}100%{box-shadow:0 0 0 12px rgba(199,91,57,0)}}
  .dots span{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:4px;animation:blink 1.2s infinite}
  .chips{display:flex;gap:8px;padding:0 16px 10px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .inputrow{background:var(--card);border-top:1px solid var(--line);padding:12px 14px;display:flex;gap:8px;align-items:flex-end}
  textarea{flex:1;resize:none;max-height:120px;border:1px solid var(--line);border-radius:14px;padding:11px 14px;font-family:inherit;font-size:15px;color:var(--ink);background:var(--bg)}
  .send{background:var(--accent);color:#fff;border:none;border-radius:14px;padding:11px 16px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
  .send:disabled{background:var(--line);cursor:default}
  .mic.listening{animation:ring 1.2s infinite;background:var(--accent);color:#fff}
  .preview{padding:0 16px 8px;display:flex;align-items:center;gap:10px}
  .preview img{width:46px;height:46px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
  ::placeholder{color:#A99E8E}
</style>
</head>
<body>
  <header>
    <div class="row between">
      <div class="row">
        <img id="avatar" class="avatar" alt="Zoi" />
        <div>
          <div class="name">Zoi</div>
          <div class="sub">profesorica</div>
        </div>
      </div>
      <div class="row" style="gap:8px">
        <button id="voiceBtn" class="iconbtn on" title="Glas">🔊</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-mode="site">Pitaj o sajtu</button>
      <button class="tab" data-mode="ftn">FTN prijemni · zadaci</button>
    </div>
  </header>

  <div id="chat"></div>

  <div class="chips" id="chips"></div>
  <div class="preview" id="preview" style="display:none"></div>

  <div class="inputrow">
    <input id="file" type="file" accept="image/*" style="display:none" />
    <button id="attachBtn" class="iconbtn" title="Pošalji sliku zadatka" style="display:none">📎</button>
    <button id="micBtn" class="iconbtn mic" title="Govori" style="display:none">🎤</button>
    <textarea id="text" rows="1" placeholder="Pitaj nešto o platformi..."></textarea>
    <button id="sendBtn" class="send" disabled>Pošalji</button>
  </div>

<script>
const AVATAR_URL = "https://i.postimg.cc/qBXWmBQf/Chat-GPT-Image-6-jun-2026-11-58-24.png";
document.getElementById("avatar").src = AVATAR_URL;

const state = { mode:"site", messages:[], attachment:null, voiceOn:true, listening:false };
const greetings = {
  site:"Ćao, ja sam Zoi! 😊 Tu sam za sva pitanja o platformi — koje predmete pokrivamo, kako funkcioniše, šta je priprema za prijemni. Šta te zanima?",
  ftn:"Zdravo! Ja sam Zoi, podrška za FTN prijemni iz matematike. 📐 Napiši zadatak ili pošalji 📷 sliku, pa ćemo korak po korak. Iz koje oblasti danas?"
};
const quick = {
  site:[["Koje predmete pokrivate?","Koje predmete pokrivate?"],["Kako funkcioniše?","Kako funkcioniše platforma?"],["Šta je priprema za prijemni?","Šta je priprema za prijemni?"]],
  ftn:[["Napiši zadatak","__fill:Imam zadatak: "],["📷 Slika zadatka","__file"],["Objasni pojam","Objasni mi jedan pojam iz gradiva za FTN prijemni."]]
};

const chat = document.getElementById("chat");
const chipsEl = document.getElementById("chips");
const textEl = document.getElementById("text");
const sendBtn = document.getElementById("sendBtn");
const fileEl = document.getElementById("file");
const attachBtn = document.getElementById("attachBtn");
const micBtn = document.getElementById("micBtn");
const voiceBtn = document.getElementById("voiceBtn");
const preview = document.getElementById("preview");

function escapeHtml(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function render(){
  chat.innerHTML = "";
  state.messages.forEach(m=>{
    const wrap=document.createElement("div"); wrap.className="msg "+(m.role==="user"?"user":"");
    if(m.role!=="user"){const a=document.createElement("img");a.className="avatar sm";a.src=AVATAR_URL;wrap.appendChild(a);}
    const b=document.createElement("div"); b.className="bubble "+(m.role==="user"?"me":"bot");
    let html=""; if(m.image) html+='<img src="'+m.image.dataUrl+'" alt="zadatak"/>';
    html+=escapeHtml(m.content||""); b.innerHTML=html; wrap.appendChild(b); chat.appendChild(wrap);
  });
  if(state.loading){
    const w=document.createElement("div");w.className="msg";
    const a=document.createElement("img");a.className="avatar sm";a.src=AVATAR_URL;w.appendChild(a);
    const b=document.createElement("div");b.className="bubble bot";b.innerHTML='<span class="dots"><span></span><span style="animation-delay:.2s"></span><span style="animation-delay:.4s"></span></span>';
    w.appendChild(b);chat.appendChild(w);
  }
  chat.scrollTop=chat.scrollHeight;
  renderChips();
}
function renderChips(){
  chipsEl.innerHTML="";
  quick[state.mode].forEach(([label,val])=>{
    const c=document.createElement("button");c.className="chip";c.textContent=label;
    c.onclick=()=>{ if(val==="__file"){fileEl.click();} else if(val.startsWith("__fill:")){textEl.value=val.slice(7);textEl.focus();updateSend();} else {sendMessage(val);} };
    chipsEl.appendChild(c);
  });
}
function setMode(m){
  if(m===state.mode) return;
  state.mode=m; state.attachment=null; preview.style.display="none";
  if(window.speechSynthesis) speechSynthesis.cancel();
  state.messages=[{role:"assistant",content:greetings[m]}];
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.mode===m));
  attachBtn.style.display = m==="ftn" ? "block":"none";
  textEl.placeholder = m==="ftn" ? "Napiši zadatak ili pitanje..." : "Pitaj nešto o platformi...";
  render();
}

function speak(t){
  if(!state.voiceOn || !window.speechSynthesis) return;
  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t);
    const vs=speechSynthesis.getVoices(); const fem=/(female|žensk|Zira|Helena|Sabina|Marica|Maja|Lana|Ana|Lucia|Petra)/i;
    const v=vs.find(x=>/^sr/i.test(x.lang)&&fem.test(x.name))||vs.find(x=>/^hr|^bs/i.test(x.lang)&&fem.test(x.name))||vs.find(x=>/^sr/i.test(x.lang))||vs.find(x=>/^hr|^bs/i.test(x.lang))||vs.find(x=>fem.test(x.name));
    if(v)u.voice=v; u.lang=(v&&v.lang)||"sr-RS"; u.rate=0.94; u.pitch=1.15; speechSynthesis.speak(u);
  }catch(e){}
}
if("speechSynthesis" in window) speechSynthesis.getVoices();

voiceBtn.onclick=()=>{ state.voiceOn=!state.voiceOn; if(!state.voiceOn&&window.speechSynthesis)speechSynthesis.cancel(); voiceBtn.classList.toggle("on",state.voiceOn); voiceBtn.textContent=state.voiceOn?"🔊":"🔇"; };

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog=null;
if(SR){ micBtn.style.display="block";
  micBtn.onclick=()=>{ if(state.listening){recog&&recog.stop();return;} recog=new SR(); recog.lang="sr-RS"; recog.interimResults=false;
    recog.onresult=e=>{ const t=e.results[0][0].transcript; textEl.value=(textEl.value?textEl.value+" ":"")+t; updateSend(); };
    recog.onend=()=>{state.listening=false;micBtn.classList.remove("listening");}; recog.onerror=()=>{state.listening=false;micBtn.classList.remove("listening");};
    state.listening=true; micBtn.classList.add("listening"); recog.start(); };
}

attachBtn.onclick=()=>fileEl.click();
fileEl.onchange=e=>{ const f=e.target.files&&e.target.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=()=>{ const d=r.result; state.attachment={dataUrl:d,base64:String(d).split(",")[1],mediaType:f.type||"image/jpeg"};
    preview.style.display="flex"; preview.innerHTML='<img src="'+d+'"/><span style="font-size:13px;color:var(--soft);font-weight:700;flex:1">Slika spremna</span><button id="rm" style="border:none;background:none;color:var(--accent);font-weight:800;cursor:pointer;font-size:13px">Ukloni</button>';
    document.getElementById("rm").onclick=()=>{state.attachment=null;preview.style.display="none";updateSend();}; updateSend(); };
  r.readAsDataURL(f); e.target.value=""; };

function updateSend(){ sendBtn.disabled = state.loading || (!textEl.value.trim() && !state.attachment); }
textEl.addEventListener("input",()=>{updateSend();});
textEl.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();} });
sendBtn.onclick=()=>sendMessage();

async function sendMessage(forced){
  const content=(forced!==undefined?forced:textEl.value).trim();
  if((!content && !state.attachment) || state.loading) return;
  const userMsg={role:"user",content:content||"Pomozi mi sa ovim zadatkom sa slike.",image:state.attachment};
  state.messages.push(userMsg); textEl.value=""; const att=state.attachment; state.attachment=null; preview.style.display="none";
  state.loading=true; updateSend(); render();
  try{
    const apiMessages=state.messages.map(m=> m.image
      ? {role:m.role,content:[{type:"text",text:m.content||"Pomozi mi sa ovim zadatkom sa slike."},{type:"image",source:{type:"base64",media_type:m.image.mediaType,data:m.image.base64}}]}
      : {role:m.role,content:m.content});
    const res=await fetch("/api/chat",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({mode:state.mode,messages:apiMessages})});
    const data=await res.json();
    const reply=data.text || "Hmm, nešto je zapelo. Pokušaj ponovo.";
    state.messages.push({role:"assistant",content:reply}); speak(reply);
  }catch(e){ state.messages.push({role:"assistant",content:"Veza je zapela. Pokušaj ponovo."}); }
  finally{ state.loading=false; updateSend(); render(); }
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>setMode(t.dataset.mode));
state.messages=[{role:"assistant",content:greetings.site}];
render();
</script>
</body>
</html>
