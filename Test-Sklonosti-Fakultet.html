var I18N=DATA.I18N, BASE=DATA.BASE, WEIGHTS=DATA.WEIGHTS, ORDER=DATA.ORDER;
function pickLang(){try{var s=localStorage.getItem('mathia_lang');if(s&&I18N[s.slice(0,2)])return s.slice(0,2);}catch(e){}var h=(document.documentElement.lang||'sr').slice(0,2);return I18N[h]?h:'sr';}
var LANG=pickLang();
var $=function(id){return document.getElementById(id);};
var i=0, ans=new Array(WEIGHTS.length).fill(null), shown='quiz';
function T(){return I18N[LANG]||I18N.sr;}
function applyStatic(){
  var u=T().ui;
  $('eyebrow').textContent=u.eyebrow;$('h1').textContent=u.h1;$('lead').textContent=u.lead;$('note').textContent=u.note;
  document.documentElement.lang=LANG; $('lang').value=LANG;
}
function render(){
  shown='quiz';var u=T().ui;
  $('pfill').style.width=(i/WEIGHTS.length*100)+'%';
  $('qnum').textContent=u.qnum+' '+(i+1)+' / '+WEIGHTS.length;
  $('qtext').textContent=T().Q[i];
  var o=$('opts');o.innerHTML='';
  T().scale.forEach(function(lab,v){var b=document.createElement('button');b.className='opt'+(ans[i]===v?' sel':'');b.textContent=lab;b.onclick=function(){ans[i]=v;render();};o.appendChild(b);});
  $('prev').textContent=u.prev;$('prev').disabled=(i===0);
  $('next').disabled=(ans[i]===null);
  $('next').textContent=(i===WEIGHTS.length-1)?u.see:u.more;
}
function result(){
  shown='result';var u=T().ui,F=T().fields;
  var score={},max={};ORDER.forEach(function(f){score[f]=0;max[f]=0;});
  WEIGHTS.forEach(function(w,qi){for(var f in w){score[f]+=w[f]*ans[qi];max[f]+=w[f]*4;}});
  var rank=ORDER.map(function(f){return {f:f,pct:max[f]?Math.round(score[f]/max[f]*100):0};}).sort(function(a,b){return b.pct-a.pct;});
  var top=rank[0];
  var html='<div class="top"><div class="lbl">'+u.topLbl+'</div><div class="nm">'+F[top.f].name+'</div><div>'+top.pct+'% '+u.match+'</div></div>';
  html+='<div class="sec">'+u.profile+'</div>';
  rank.forEach(function(r){html+='<div class="barrow"><div class="h"><span>'+F[r.f].name+'</span><span class="p">'+r.pct+'%</span></div><div class="track"><i style="width:'+r.pct+'%"></i></div></div>';});
  html+='<div class="sec">'+u.recs+'</div>';
  rank.slice(0,3).forEach(function(r){var f=r.f,fx=F[f],b=BASE[f];
    html+='<div class="rec"><h3>'+fx.name+' · '+r.pct+'%</h3>';
    html+='<div class="meta">'+fx.desc+'</div>';
    html+='<div class="meta"><b>'+u.fakLbl+':</b> '+b.fak+'</div>';
    html+='<div class="meta"><b>'+u.savLbl+':</b> '+fx.sav+'</div>';
    if(b.link&&fx.linktxt)html+='<div class="meta">→ <a href="'+b.link+'">'+fx.linktxt+'</a></div>';
    html+='</div>';});
  html+='<div class="row" style="margin-top:20px"><button class="btn btn-o" id="again">'+u.repeat+'</button><a class="btn btn-g" href="'+BASE.mat.link+'">'+u.solve+'</a></div>';
  html+='<p class="note" style="margin-top:14px">'+u.disc+'</p>';
  $('quiz').classList.add('hidden');var R=$('result');R.innerHTML=html;R.classList.remove('hidden');
  $('again').onclick=restart;R.scrollIntoView({behavior:'smooth',block:'start'});
}
function restart(){i=0;for(var k=0;k<ans.length;k++)ans[k]=null;$('result').classList.add('hidden');$('quiz').classList.remove('hidden');render();window.scrollTo({top:0,behavior:'smooth'});}
$('prev').onclick=function(){if(i>0){i--;render();}};
$('next').onclick=function(){if(ans[i]===null)return;if(i<WEIGHTS.length-1){i++;render();}else result();};
$('lang').onchange=function(){LANG=this.value;try{localStorage.setItem('mathia_lang',LANG);}catch(e){}applyStatic();if(shown==='result')result();else render();};
applyStatic();render();
</script>
