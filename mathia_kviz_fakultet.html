<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@800&display=swap" rel="stylesheet">
<style>
:root{--navy:#14223E;--navy2:#1E3157;--gold:#C2A14D;--golddk:#9C7E33;--goldlt:#E6CE86;--cream:#FAF7F0;--card:#FFFFFF;--ink:#1A1F2B;--muted:#7C8190;--bord:#E6DECB;--soft:#F2EEE2;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:var(--cream);}
.wrap{max-width:720px;margin:0 auto;padding:14px 18px 44px;}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.brand{display:flex;align-items:center;gap:10px;}
.seal{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 34% 30%,#F4E2A8,#C2A14D 56%,#8E7230);display:flex;align-items:center;justify-content:center;color:#14223E;font-weight:800;font-size:22px;font-family:'Playfair Display',serif;box-shadow:0 8px 20px rgba(142,114,48,.4),0 0 0 3px rgba(230,206,134,.22);}
.wm{font-weight:900;font-size:22px;} .wm .ia{color:var(--golddk);}
.lt{font-size:12.5px;font-weight:800;} .lt span{padding:3px 9px;border-radius:999px;cursor:pointer;color:var(--muted);} .lt span.on{background:var(--gold);color:#14223E;}
.hero{background:radial-gradient(circle at 50% -30%,#27406e,#1E3157 45%,#14223E 88%);color:#fff;border-radius:20px;padding:34px 24px;text-align:center;box-shadow:inset 0 -3px 0 var(--gold);}
.hero .st{color:var(--gold);letter-spacing:5px;font-size:13px;}
.hero h1{font-family:'Playfair Display',serif;font-size:30px;margin:8px 0 10px;}
.hero p{color:#d7deec;font-weight:600;font-size:15px;max-width:520px;margin:0 auto 18px;}
.btn{display:inline-block;border:none;cursor:pointer;border-radius:12px;padding:14px 28px;font-weight:800;font-size:16px;font-family:inherit;background:linear-gradient(135deg,#E6CE86,#C2A14D 60%,#9C7E33);color:#14223E;box-shadow:0 8px 20px rgba(156,126,51,.4);}
.bar{height:8px;background:var(--soft);border-radius:999px;overflow:hidden;margin:6px 0 4px;}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,#E6CE86,#C2A14D);width:0;transition:width .25s;}
.qmeta{font-size:13px;font-weight:800;color:var(--golddk);letter-spacing:.5px;}
.q{font-size:21px;font-weight:900;margin:10px 0 16px;line-height:1.3;}
.opt{display:block;width:100%;text-align:left;font-family:inherit;font-size:15px;font-weight:700;color:var(--ink);background:var(--card);border:1.5px solid var(--bord);border-radius:13px;padding:14px 16px;margin-bottom:10px;cursor:pointer;}
.opt:hover{border-color:var(--gold);background:#FFFBF1;box-shadow:0 4px 14px rgba(20,34,62,.06);}
.back{margin-top:6px;background:none;border:none;color:var(--muted);font-weight:800;cursor:pointer;font-family:inherit;font-size:14px;}
.card{background:var(--card);border:1px solid var(--bord);border-radius:18px;padding:24px;}
.ricon{font-size:42px;text-align:center;}
.rname:after{content:'';display:block;width:54px;height:2px;margin:8px auto 0;background:linear-gradient(90deg,transparent,#C2A14D,transparent);}
.rname{font-family:'Playfair Display',serif;font-size:26px;font-weight:800;text-align:center;color:var(--navy);margin:4px 0 4px;}
.rdesc{text-align:center;color:#3a352e;font-weight:600;margin-bottom:16px;}
.rblock{background:var(--soft);border-left:4px solid var(--gold);border-radius:8px;padding:12px 14px;margin-bottom:12px;}
.rblock h4{font-size:14px;font-weight:900;color:var(--golddk);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.rblock p{font-size:14px;font-weight:600;color:var(--ink);line-height:1.5;}
.second{font-size:13.5px;color:var(--muted);font-weight:700;text-align:center;margin:4px 0 14px;}
.note{font-size:12.5px;color:var(--muted);font-weight:600;text-align:center;margin-top:14px;line-height:1.5;}
.hide{display:none;} .cta-row{text-align:center;margin-top:16px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><div class="seal">M</div><div class="wm">Math<span class="ia">IA</span></div></div>
    <div class="lt" id="lt"><span data-l="sr" class="on">Srpski</span><span data-l="en">English</span></div>
  </div>

  <section id="start">
    <div class="hero">
      <div class="st">★ ★ ★ ★ ★</div>
      <h1 id="sTitle"></h1>
      <p id="sIntro"></p>
      <button class="btn" id="sBtn" onclick="start()"></button>
    </div>
  </section>

  <section id="quiz" class="hide">
    <div class="qmeta" id="qmeta"></div>
    <div class="bar"><i id="prog"></i></div>
    <div class="q" id="qtext"></div>
    <div id="opts"></div>
    <button class="back" id="backBtn" onclick="back()"></button>
  </section>

  <section id="result" class="hide">
    <div class="card">
      <div class="ricon" id="ricon"></div>
      <div class="rname" id="rname"></div>
      <div class="rdesc" id="rdesc"></div>
      <div class="second" id="rsecond"></div>
      <div class="rblock"><h4 id="nsLabel"></h4><p id="rns"></p></div>
      <div class="rblock"><h4 id="bgLabel"></h4><p id="rbg"></p></div>
      <p class="note" id="rnote"></p>
      <div class="cta-row"><button class="btn" id="rBtn" onclick="restart()"></button></div>
    </div>
  </section>
</div>

var QS={

 {q:"Idealan posao?",o:[["Inženjer ili programer","A"],["Lekar, farmaceut ili terapeut","C"],["Menadžer, pravnik ili ekonomista","D"],["Profesor, prevodilac ili psiholog","E"],["Umetnik, dizajner ili glumac","F"]]},

 {q:"Najviše voliš da radiš sa…",o:[["tehnologijom i alatima","A"],["ljudima kojima treba pomoć","C"],["tekstom, jezicima i idejama","E"],["biljkama, hranom i okolinom","G"],["novcem, propisima i planovima","D"]]},

 {q:"Šta ti najbolje ide?",o:[["Empatija i briga o drugima","C"],["Organizacija i ubeđivanje","D"],["Pisanje i komunikacija","E"],["Kreativnost i estetika","F"],["Rad napolju i sa živim svetom","G"]]},
 {q:"Biraš izborni kurs:",o:[["Programiranje ili elektronika","A"],["Napredna matematika ili fizika","B"],["Prva pomoć i anatomija","C"],["Psihologija ili strani jezik","E"],["Ekologija ili agronomija","G"]]}
 ],

var lang='sr', idx=0, scores={}, picks=[], screen='start', lastBest='', lastSecond='';
function setLang(l){lang=l;var t=document.getElementById('lt').children;for(var i=0;i<t.length;i++){t[i].className=(t[i].getAttribute('data-l')===l)?'on':'';}document.documentElement.lang=l;paint();}
function paint(){
 var u=U[lang];
 document.getElementById('sTitle').textContent=u.title;
 document.getElementById('sIntro').textContent=u.intro;
 document.getElementById('sBtn').textContent=u.btn;
 document.getElementById('backBtn').textContent=u.back;
 document.getElementById('nsLabel').textContent=u.ns;
 document.getElementById('bgLabel').textContent=u.bg;
 document.getElementById('rnote').textContent=u.note;
 document.getElementById('rBtn').textContent=u.restart;
 if(screen==='quiz')render();
 if(screen==='result')paintResult();
}
function show(id){screen=id;['start','quiz','result'].forEach(function(s){document.getElementById(s).className=(s===id)?'':'hide';});}
function start(){idx=0;scores={A:0,B:0,C:0,D:0,E:0,F:0,G:0};picks=[];show('quiz');render();}
function render(){
 var u=U[lang],it=QS[lang][idx];
 document.getElementById('qmeta').textContent=u.qword+' '+(idx+1)+' '+u.of+' '+QS[lang].length;
 document.getElementById('prog').style.width=Math.round(idx/QS[lang].length*100)+'%';
 document.getElementById('qtext').textContent=it.q;
 var box=document.getElementById('opts');box.innerHTML='';
 for(var i=0;i<it.o.length;i++){(function(opt){var b=document.createElement('button');b.className='opt';b.textContent=opt[0];b.onclick=function(){choose(opt[1]);};box.appendChild(b);})(it.o[i]);}
 document.getElementById('backBtn').style.visibility=(idx===0)?'hidden':'visible';
}
function choose(f){scores[f]++;picks[idx]=f;idx++;if(idx<QS[lang].length){render();}else{result();}}
function back(){if(idx>0){idx--;if(picks[idx]){scores[picks[idx]]--;}render();}}
function result(){
 var best='A',bv=-1;for(var k in scores){if(scores[k]>bv){bv=scores[k];best=k;}}
 var second='',sv=-1;for(var k2 in scores){if(k2!==best&&scores[k2]>sv){sv=scores[k2];second=k2;}}
 lastBest=best;lastSecond=(sv>0)?second:'';
 show('result');paintResult();
}
function paintResult(){
 var u=U[lang],b=lastBest;
 document.getElementById('ricon').textContent=ICON[b];
 document.getElementById('rname').textContent=FN[lang][b];
 document.getElementById('rdesc').textContent=FD[lang][b];
 document.getElementById('rns').textContent=INST[b].ns;
 document.getElementById('rbg').textContent=INST[b].bg;
 document.getElementById('rsecond').textContent=lastSecond?(u.second+FN[lang][lastSecond]):'';
 document.getElementById('prog').style.width='100%';
}
function restart(){show('start');}
setLang('sr');
