<style>
:root{--paper:#FBF6EE;--rose:#CC8E86;--plum:#432C37;--gold:#C6A05C;--golddk:#9C7838;--goldlt:#E7D2A2}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(120% 120% at 50% 0%,#fff,var(--paper) 60%);color:var(--plum);font-family:Inter,system-ui,Arial,sans-serif;min-height:100vh;padding:26px 14px}
.wrap{width:100%;max-width:820px;margin:0 auto}
.card{background:#fff;border:1px solid var(--goldlt);border-radius:22px;box-shadow:0 24px 60px rgba(67,44,55,.12);padding:26px 24px;position:relative;overflow:hidden;margin-bottom:16px}
.card:before{content:"";position:absolute;inset:0 0 auto 0;height:5px;background:linear-gradient(90deg,var(--goldlt),var(--gold),var(--golddk))}
.brand{font-size:12px;letter-spacing:.32em;color:var(--golddk);font-weight:700}
h1{font-family:'Spectral',serif;font-weight:700;font-size:32px;margin:6px 0 2px}
h2{font-family:'Spectral',serif;font-weight:700;font-size:22px;margin:0 0 12px}
.hi{color:#7a6b66;margin:0 0 4px}
.lang{position:absolute;top:14px;right:14px;appearance:menulist;font:700 14px Inter,sans-serif;padding:7px 10px;border-radius:999px;background:#fff;border:2px solid var(--gold);color:var(--plum);cursor:pointer}
.prow{display:flex;justify-content:space-between;gap:12px;border-bottom:1px dashed var(--goldlt);padding:10px 2px;font-size:15px}
.prow span:first-child{color:#8a7a74}.prow span:last-child{font-weight:600;text-align:right}
.big{font-family:'Spectral',serif;font-size:26px;font-weight:700;color:var(--golddk)}
.bar{height:11px;background:#f0e6d4;border-radius:999px;overflow:hidden;margin:6px 0}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--golddk));width:0;transition:width .5s ease}
.ringwrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center}
.pct{font-family:'Spectral',serif;font-size:40px;font-weight:700;color:var(--golddk)}
.subj{border:1px solid var(--goldlt);border-radius:14px;padding:14px 16px;margin:10px 0}
.subj .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.subj .nm{font-weight:700}.subj .me{font-size:13px;color:#8a7a74;margin-top:3px}
.pill{display:inline-block;font-size:12px;color:var(--golddk);border:1px solid var(--goldlt);border-radius:999px;padding:3px 9px;margin:4px 6px 0 0}
a.btn,button.btn{display:inline-block;border:1px solid var(--goldlt);background:#fff;color:var(--plum);font:600 15px Inter,sans-serif;padding:11px 16px;border-radius:12px;cursor:pointer;text-decoration:none;transition:.18s}
a.btn:hover,button.btn:hover{border-color:var(--gold);transform:translateY(-1px)}
.primary{background:linear-gradient(180deg,var(--gold),var(--golddk));color:#fff;border:none}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.plan{background:#FBF6EE;border:1px solid var(--goldlt);border-radius:14px;padding:14px 16px;font-size:15px;line-height:1.5}
.muted{color:#8a7a74}.center{text-align:center}
details{margin-top:10px}summary{cursor:pointer;color:var(--golddk);font-weight:600;font-size:14px}
.tasks{list-style:none;padding:0;margin:8px 0 0}
.tasks li{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:14.5px;border-bottom:1px dashed #f0e6d4}
.tasks .ck{width:18px;height:18px;border-radius:5px;border:2px solid var(--goldlt);display:inline-flex;align-items:center;justify-content:center;font-size:12px;color:#fff;flex:none}
.tasks li.done .ck{background:linear-gradient(180deg,var(--gold),var(--golddk));border-color:var(--golddk)}
.tasks li.done span{color:#8a7a74;text-decoration:line-through}
.foot{text-align:center;font-size:12px;color:#a89a93;margin-top:6px}
.hide{display:none}

.page,.box,.bx-b,.task,.step,.intro,.endcard{max-width:100%}

.rule{margin-top:30px}

var lang="sr",t,profile=null,subjects=[];
function $(id){return document.getElementById(id)}
function row(k,v){return '<div class="prow"><span>'+k+'</span><span>'+v+'</span></div>'}
function nm(key){var n=NAMES[key];return n?(n[lang]||n.sr):key}
function pageFor(key){return "predmet-"+(key==="fax-verovatnoca"?"verovatnoca":key)+".html"}

function pct(s){
 if(s.obaveze&&s.obaveze.length){var d=s.obaveze.filter(function(o){return o.g}).length;return Math.round(d/s.obaveze.length*100);}
 if(typeof s.procenat==="number")return Math.max(0,Math.min(100,s.procenat));
 if(s.status==="zavrseno"||s.status==="završeno")return 100;
 return 0;
}

async function load(){
 if(sb){ try{
   var u=await sb.auth.getUser(); var user=u&&u.data&&u.data.user;
   if(!user){ render(false); return; }
   var pr=await sb.from('mathia_profil').select('*').eq('user_id',user.id).maybeSingle();
   profile=pr&&pr.data?pr.data:null;
   var np=await sb.from('mathia_napredak').select('*').eq('user_id',user.id).order('azurirano',{ascending:false});
   subjects=(np&&np.data)?np.data:[];
   render(true,user); return;
 }catch(e){} }
 try{ var ls=localStorage.getItem('mathia_profil'); if(ls) profile=JSON.parse(ls);}catch(e){}
 render(true,null);
}

function render(loggedOk,user){t=T[lang];
 $("t_title").textContent=t.title;$("t_hi").textContent=t.hi;
 $("a_again").textContent=t.again;$("a_back").textContent=t.back;
 var showLogin=(sb && !user && !profile);
 $("c_login").classList.toggle("hide",!showLogin);
 $("t_needlogin").textContent=t.needlogin;$("a_login").textContent=t.login;

 // overall
 if(subjects&&subjects.length){
   var avg=Math.round(subjects.reduce(function(a,s){return a+pct(s)},0)/subjects.length);
   $("c_overall").classList.remove("hide");
   $("t_overallH").textContent=t.overallH;
   $("o_pct").textContent=avg+"%";
   $("o_bar").style.width=avg+"%";
   var totDone=0,totAll=0;
   subjects.forEach(function(s){if(s.obaveze&&s.obaveze.length){totAll+=s.obaveze.length;totDone+=s.obaveze.filter(function(o){return o.g}).length;}});
   $("o_sub").textContent=totAll?(totDone+" "+t.ofDone+" "+totAll+" · "+t.tasks.toLowerCase()):"";
 }else $("c_overall").classList.add("hide");

 if(profile){
   $("c_profile").classList.remove("hide");$("c_noprofile").classList.add("hide");
   $("t_profileH").textContent=t.profileH;$("t_leadL").textContent=t.lead;
   $("p_lead").textContent=t.types[profile.top_oblast]||"—";
   $("p_rows").innerHTML=row(t.styleL,t.stil[profile.stil]||"—")+row(t.minL,"≈ "+(profile.minuta||"—")+" "+t.min)+row(t.timeL,t.vreme[profile.vreme]||"—")+row(t.socL,t.drustvo[profile.drustvo]||"—");
   $("p_plan").innerHTML=t.plan.replace("%m",profile.minuta||"—").replace("%t",t.vreme[profile.vreme]||"").replace("%s",t.stil[profile.stil]||"");
 }else{
   $("c_profile").classList.add("hide");$("c_noprofile").classList.remove("hide");
   $("t_profileH2").textContent=t.profileH;$("t_noprofile").textContent=t.noprofile;$("a_test").textContent=t.test;
   $("p_plan").textContent=t.noprofile;
 }
 $("t_planH").textContent=t.planH;
 $("t_subjH").textContent=t.subjH;
 var box=$("p_subj");
 if(subjects&&subjects.length){
   box.innerHTML=subjects.map(function(s){
     var p=pct(s),meta=[];
     if(s.poslednja_tema)meta.push('<span class="pill">'+t.last+": "+s.poslednja_tema+'</span>');
     if(s.minuta_ukupno)meta.push('<span class="pill">'+t.total+": "+s.minuta_ukupno+" "+t.min+'</span>');
     if(s.serija)meta.push('<span class="pill">'+t.streak+": "+s.serija+" "+t.days+'</span>');
     var tasks="";
     if(s.obaveze&&s.obaveze.length){
       var d=s.obaveze.filter(function(o){return o.g}).length;
       tasks='<details><summary>'+t.tasks+" ("+d+" "+t.ofDone+" "+s.obaveze.length+')</summary><ul class="tasks">'+
         s.obaveze.map(function(o){return '<li class="'+(o.g?"done":"")+'"><span class="ck">'+(o.g?"✓":"")+'</span><span>'+(o.t||"")+'</span></li>'}).join("")+
         '</ul></details>';
     }
     return '<div class="subj"><div class="top"><div><div class="nm">'+nm(s.predmet)+'</div><div class="me">'+meta.join(" ")+'</div></div>'
       +'<a class="btn primary" href="'+pageFor(s.predmet)+'">'+t.cont+'</a></div>'
       +'<div class="bar"><i style="width:'+p+'%"></i></div>'
       +'<div class="muted" style="font-size:13px">'+p+'% '+t.done+'</div>'
       +tasks+'</div>';
   }).join("");
 }else{ box.innerHTML='<p class="muted">'+t.none+'</p>'; }
}
$("lang").onchange=function(){lang=this.value;document.documentElement.lang=lang;render(true,profile&&true);};
load();
</script>
