var CHAT={sred:"predmet-priprema-srednja.html",visa:"predmet-priprema-visa.html",fak:"predmet-priprema-fakultet.html"};
var lang="sr",lvl=null,idx=0,ans=[],t,lastProfile=null;
function $(id){return document.getElementById(id)}
function QL(){return t.qi.concat(t.qs,[t.tempo,t.vremeQ,t.drustvoQ,t.rokQ])}
var p=new URLSearchParams(location.search).get("nivo");
if(p){if(p.indexOf("sred")>-1)lvl="sred";else if(p.indexOf("vis")>-1)lvl="visa";else if(p.indexOf("fak")>-1||p.indexOf("univ")>-1)lvl="fak";}

function paintStart(){t=L[lang];
 $("s_title").textContent=t.title;$("s_sub").textContent=t.sub;$("s_pick").textContent=t.pick;
 $("b_sred").innerHTML=t.sred+"<small>"+t.sredS+"</small>";
 $("b_visa").innerHTML=t.visa+"<small>"+t.visaS+"</small>";
 $("b_fak").innerHTML=t.fak+"<small>"+t.fakS+"</small>";}
function show(s){["start","quiz","result"].forEach(function(x){$(x).classList.add("hide")});$(s).classList.remove("hide")}
function startQuiz(l){lvl=l;idx=0;ans=[];show("quiz");paintQ()}
function paintQ(){t=L[lang];var L2=QL(),Q=L2[idx];
 $("q_meta").textContent=(idx+1)+" "+t.of+" "+L2.length;
 $("q_bar").style.width=(idx/L2.length*100)+"%";
 $("q_text").textContent=Q.t;
 var box=$("q_opts");box.innerHTML="";
 Q.o.forEach(function(txt,i){var b=document.createElement("button");b.className="btn"+(ans[idx]===i?" sel":"");b.textContent=txt;b.onclick=function(){ans[idx]=i;paintQ()};box.appendChild(b)});
 $("q_back").textContent=t.back;$("q_back").style.visibility=idx?"visible":"hidden";
 $("q_next").textContent=(idx===L2.length-1)?t.see:t.next;
 $("q_next").disabled=(ans[idx]==null);$("q_next").style.opacity=(ans[idx]==null)?.5:1;}
$("q_back").onclick=function(){if(idx){idx--;paintQ()}};
$("q_next").onclick=function(){var n=QL().length;if(ans[idx]==null)return;if(idx<n-1){idx++;paintQ()}else result()};

function recMin(base,rok){return rok==="short"?Math.round(base*1.3/5)*5:base}
function result(){t=L[lang];
 var c={T:0,E:0,P:0,D:0,U:0};for(var i=0;i<8;i++)if(ans[i]!=null)c[TYPES[ans[i]]]++;
 var best="T",bv=-1;TYPES.forEach(function(k){if(c[k]>bv){bv=c[k];best=k}});
 var sc={V:0,Pr:0,Te:0,Ex:0};[8,9].forEach(function(qi){if(ans[qi]!=null)sc[STYLES[ans[qi]]]++});
 var bst="V",sv=-1;STYLES.forEach(function(k){if(sc[k]>sv){sv=sc[k];bst=k}});
 var tempo=VAL.tempo[ans[10]!=null?ans[10]:1], vreme=VAL.vreme[ans[11]!=null?ans[11]:0], drustvo=VAL.drustvo[ans[12]!=null?ans[12]:0], rok=VAL.rok[ans[13]!=null?ans[13]:2];
 var minuta=recMin(tempo,rok);
 lastProfile={nivo:lvl,scores:c,top_oblast:best,stil:bst,minuta:minuta,vreme:vreme,drustvo:drustvo,rok:rok,datum:new Date().toISOString()};
 show("result");
 $("r_emblem").textContent=SYM[best]||"✦";
 $("r_lead").textContent=t.lead;$("r_type").textContent=t.types[best];
 $("r_sugg_h").textContent=t.sugg;$("r_sugg").textContent=(lvl==="sred"?t.rS:t.rF)[best];
 $("r_profile").innerHTML=
   row(t.profStyle,t.stil[bst])+row(t.profMin,"≈ "+minuta+" "+t.minU)+row(t.profTime,t.vreme[vreme])+row(t.profSoc,t.drustvo[drustvo]);
 $("r_steps_h").textContent=t.stepsH;
 var steps=[t.step1.replace("%a",t.types[best]),t.step2.replace("%s",t.stilX[bst]),t.step3.replace("%m",minuta)];
 $("r_steps").innerHTML=steps.map(function(s){return "<li>"+s+"</li>"}).join("");
 $("r_note").textContent=t.note;$("r_again").textContent=t.again;
 $("r_chat_b").textContent=t.chat;$("r_chat").href=CHAT[lvl]||"#";
 $("r_save").textContent=t.save;$("r_prog_b").textContent=t.prog;$("r_status").textContent="";}
function row(k,v){return '<div class="prow"><span>'+k+'</span><span>'+v+'</span></div>'}

async function save(){t=L[lang];if(!lastProfile)return;var done=false;
 try{ if(sb){const {data:{user}}=await sb.auth.getUser(); if(user){ await sb.from('mathia_profil').upsert(Object.assign({user_id:user.id},lastProfile,{azurirano:lastProfile.datum})); $("r_status").textContent=t.saved; done=true; } } }catch(e){}
 if(!done){ try{localStorage.setItem("mathia_profil",JSON.stringify(lastProfile))}catch(e){} $("r_status").innerHTML=t.savedLoc+' <a href="nalog.html">↗</a>'; }
}
$("r_save").onclick=save;
$("r_again").onclick=function(){idx=0;ans=[];if(p)startQuiz(lvl);else show("start")};

$("lang").onchange=function(){lang=this.value;document.documentElement.lang=lang;paintStart();if(!$("quiz").classList.contains("hide"))paintQ();if(!$("result").classList.contains("hide"))result()};
paintStart();
if(lvl&&p)startQuiz(lvl);else show("start");
