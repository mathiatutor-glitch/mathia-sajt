<!doctype html>
<html lang="sr-Latn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Dopuna — 48h sa Profesoricom · Mathia</title>
<style>
  :root{--plum:#432C37;--gold:#C6A05C;--golddk:#9C7838;--cream:#FBF6EE}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:
    radial-gradient(700px 380px at 82% -12%,rgba(198,160,92,.16),transparent 60%),
    linear-gradient(168deg,#FCF8F0,#F4E9D8);color:var(--plum);
    font-family:'Inter',system-ui,-apple-system,sans-serif;padding:22px}
  .card{width:100%;max-width:440px;background:#fff;border:1px solid #E7D2A2;border-radius:22px;
    box-shadow:0 30px 70px -30px rgba(67,44,55,.35);padding:30px 26px;text-align:center}
  .eyebrow{font-size:11px;letter-spacing:.3em;color:var(--golddk);font-weight:800;text-transform:uppercase}
  h1{font-family:'Spectral','Cormorant Garamond',Georgia,serif;font-weight:700;font-size:26px;margin:10px 0 6px}
  p{color:#7a6b66;font-size:15px;line-height:1.6;margin:0 0 8px}
  .price{font-family:'Spectral',serif;font-weight:700;font-size:34px;color:var(--plum);margin:14px 0 2px}
  .price small{font-size:15px;color:var(--golddk);font-weight:600}
  .meta{font-size:13px;color:#8a7a74;margin-bottom:18px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:linear-gradient(135deg,#D3B06A,#9C7838);color:#fff;border:none;border-radius:14px;
    padding:15px 20px;font:800 15px 'Inter',sans-serif;letter-spacing:.02em;cursor:pointer;
    box-shadow:0 14px 30px -12px rgba(156,120,56,.7);transition:transform .15s,box-shadow .15s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 20px 38px -12px rgba(156,120,56,.9)}
  .btn[disabled]{opacity:.6;cursor:default;transform:none}
  .fine{font-size:12px;color:#a89a93;margin-top:14px;line-height:1.5}
  .err{color:#b23b4e;font-size:14px;margin-top:12px;display:none}
  .spin{width:30px;height:30px;border:3px solid #ECDAC5;border-top-color:var(--gold);border-radius:50%;
    animation:r 1s linear infinite;margin:6px auto 0;display:none}
  @keyframes r{to{transform:rotate(360deg)}}
  a.back{display:inline-block;margin-top:14px;color:var(--golddk);font-weight:600;font-size:13px;text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Mathia · Dopuna</div>
    <h1>Nastavi sa Profesoricom</h1>
    <p id="sub">48 sati razgovora s Profesoricom za ovaj predmet.</p>
    <div class="price">1.990 <small>RSD</small></div>
    <div class="meta">Traje 48h · samo Profesorica (ne i skripte/formule)</div>
    <button class="btn" id="go">Plati i nastavi →</button>
    <div class="spin" id="spin"></div>
    <div class="err" id="err"></div>
    <p class="fine">Bezbedno plaćanje karticom preko banke. Na računu se iskazuje kao „Planer".</p>
    <a class="back" href="javascript:history.back()">← Nazad</a>
  </div>

<script>
(function(){
  function q(id){ return document.getElementById(id); }
  function subject(){ return decodeURIComponent((location.hash||'').replace(/^#/,'')).trim(); }
  function lang(){ try{ return (localStorage.getItem('mathia_lang')||'sr').slice(0,2).toLowerCase(); }catch(e){ return 'sr'; } }
  function sbToken(){
    try{
      for(var i=0;i<localStorage.length;i++){
        var k=localStorage.key(i);
        if(k && /^sb-.*-auth-token$/.test(k)){
          var raw=localStorage.getItem(k); if(!raw) continue;
          var v=JSON.parse(raw);
          var t=v && (v.access_token || (v.currentSession && v.currentSession.access_token) || (v.session && v.session.access_token));
          if(t) return t;
        }
      }
    }catch(e){}
    return '';
  }
  function showErr(msg){ var e=q('err'); e.textContent=msg; e.style.display='block'; q('spin').style.display='none'; q('go').disabled=false; q('go').textContent='Pokušaj ponovo →'; }

  var pred = subject();
  if(!pred){ showErr('Nedostaje predmet. Vrati se u razgovor pa ponovo klikni na dopunu.'); q('go').disabled=true; }

  async function start(){
    var tok = sbToken();
    if(!tok){ location.href = 'nalog.html?next=' + encodeURIComponent('dopuna.html#'+pred); return; }
    q('go').disabled=true; q('go').textContent='Otvaramo plaćanje…'; q('spin').style.display='block'; q('err').style.display='none';
    try{
      var r = await fetch('/api/pass-start', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ token: tok, mode: pred, lang: lang() })
      });
      var j = await r.json().catch(function(){ return {}; });
      if(r.status===401){ location.href = 'nalog.html?next=' + encodeURIComponent('dopuna.html#'+pred); return; }
      if(!r.ok || !j.paymentUrl){ showErr(j.greska || 'Nešto nije u redu. Pokušaj ponovo za koji minut.'); return; }
      location.href = j.paymentUrl;   // → pay-start → banka
    }catch(e){ showErr('Nema veze sa serverom. Proveri internet pa pokušaj ponovo.'); }
  }

  q('go').addEventListener('click', start);
})();
</script>
</body>
</html>
