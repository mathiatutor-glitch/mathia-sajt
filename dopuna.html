<!doctype html>
<html lang="sr-Latn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Dopuna — 48h sa Profesoricom · Mathia</title>
<style>
  :root{--plum:#432C37;--gold:#C6A05C;--golddk:#9C7838;--cream:#FBF6EE}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:
    radial-gradient(700px 380px at 82% -12%,rgba(198,160,92,.16),transparent 60%),
    linear-gradient(168deg,#FCF8F0,#F4E9D8);color:var(--plum);
    font-family:'Inter',system-ui,-apple-system,sans-serif;padding:22px}
  .card{width:100%;max-width:440px;background:#fff;border:1px solid #E7D2A2;border-radius:22px;
    box-shadow:0 30px 70px -30px rgba(67,44,55,.35);padding:30px 26px;text-align:center}
  .eyebrow{font-size:11px;letter-spacing:.3em;color:var(--golddk);font-weight:800;text-transform:uppercase}
  h1{font-family:'Spectral','Cormorant Garamond',Georgia,serif;font-weight:700;font-size:26px;margin:10px 0 6px}
  p{color:#7a6b66;font-size:15px;line-height:1.6;margin:0 0 8px}
  .price{font-family:'Spectral',serif;font-weight:700;font-size:34px;color:var(--plum);margin:14px 0 2px}
  .price small{font-size:15px;color:var(--golddk);font-weight:600}
  .meta{font-size:13px;color:#8a7a74;margin-bottom:18px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:linear-gradient(135deg,#D3B06A,#9C7838);color:#fff;border:none;border-radius:14px;
    padding:15px 20px;font:800 15px 'Inter',sans-serif;letter-spacing:.02em;cursor:pointer;
    box-shadow:0 14px 30px -12px rgba(156,120,56,.7);transition:transform .15s,box-shadow .15s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 20px 38px -12px rgba(156,120,56,.9)}
  .btn[disabled]{opacity:.6;cursor:default;transform:none}
  .fine{font-size:12px;color:#a89a93;margin-top:14px;line-height:1.5}
  .err{color:#b23b4e;font-size:14px;margin-top:12px;display:none}
  .spin{width:30px;height:30px;border:3px solid #ECDAC5;border-top-color:var(--gold);border-radius:50%;
    animation:r 1s linear infinite;margin:6px auto 0;display:none}
  @keyframes r{to{transform:rotate(360deg)}}
  a.back{display:inline-block;margin-top:14px;color:var(--golddk);font-weight:600;font-size:13px;text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow" id="eye">Mathia · Dopuna</div>
    <h1 id="h1">Nastavi sa Profesoricom</h1>
    <p id="sub">48 sati razgovora s Profesoricom za ovaj predmet.</p>
    <div class="price">1.990 <small>RSD</small></div>
    <div class="meta" id="meta">Traje 48h · samo Profesorica (ne i skripte/formule)</div>
    <button class="btn" id="go">Plati i nastavi →</button>
    <div class="spin" id="spin"></div>
    <div class="err" id="err"></div>
    <p class="fine" id="fine">Bezbedno plaćanje karticom preko banke. Na računu se iskazuje kao „Planer".</p>
    <a class="back" id="back" href="javascript:history.back()">← Nazad</a>
  </div>

<script>
(function(){
  var T = {
    sr:{eye:"Mathia · Dopuna",h1:"Nastavi sa Profesoricom",sub:"48 sati razgovora s Profesoricom za ovaj predmet.",meta:"Traje 48h · samo Profesorica (ne i skripte/formule)",go:"Plati i nastavi →",fine:"Bezbedno plaćanje karticom preko banke. Na računu se iskazuje kao „Planer".",back:"← Nazad",retry:"Pokušaj ponovo →",opening:"Otvaramo plaćanje…",noSubj:"Nedostaje predmet. Vrati se u razgovor pa ponovo klikni na dopunu.",errGen:"Nešto nije u redu. Pokušaj ponovo za koji minut.",errNet:"Nema veze sa serverom. Proveri internet pa pokušaj ponovo."},
    en:{eye:"Mathia · Top-up",h1:"Continue with Profesorica",sub:"48 hours of chat with Profesorica for this subject.",meta:"Lasts 48h · Profesorica only (not scripts/formulas)",go:"Pay and continue →",fine:"Secure card payment via the bank. Appears on the receipt as “Planer”.",back:"← Back",retry:"Try again →",opening:"Opening payment…",noSubj:"Subject missing. Go back to the chat and click the top-up again.",errGen:"Something went wrong. Try again in a minute.",errNet:"No connection to the server. Check your internet and try again."},
    de:{eye:"Mathia · Aufladung",h1:"Weiter mit Profesorica",sub:"48 Stunden Gespräch mit Profesorica für dieses Fach.",meta:"Dauert 48 Std. · nur Profesorica (nicht Skripte/Formeln)",go:"Bezahlen und weiter →",fine:"Sichere Kartenzahlung über die Bank. Erscheint auf dem Beleg als „Planer“.",back:"← Zurück",retry:"Erneut versuchen →",opening:"Zahlung wird geöffnet…",noSubj:"Fach fehlt. Geh zurück zum Chat und klicke erneut auf die Aufladung.",errGen:"Etwas ist schiefgelaufen. Versuch es in einer Minute erneut.",errNet:"Keine Verbindung zum Server. Prüfe dein Internet und versuch es erneut."},
    fr:{eye:"Mathia · Recharge",h1:"Continue avec Profesorica",sub:"48 heures d'échange avec Profesorica pour cette matière.",meta:"Dure 48h · Profesorica seulement (pas les cours/formules)",go:"Payer et continuer →",fine:"Paiement sécurisé par carte via la banque. Apparaît sur le reçu comme « Planer ».",back:"← Retour",retry:"Réessayer →",opening:"Ouverture du paiement…",noSubj:"Matière manquante. Retourne au chat et reclique sur la recharge.",errGen:"Une erreur s'est produite. Réessaie dans une minute.",errNet:"Pas de connexion au serveur. Vérifie ta connexion et réessaie."},
    es:{eye:"Mathia · Recarga",h1:"Continúa con Profesorica",sub:"48 horas de conversación con Profesorica para esta asignatura.",meta:"Dura 48h · solo Profesorica (no apuntes/fórmulas)",go:"Pagar y continuar →",fine:"Pago seguro con tarjeta a través del banco. Aparece en el recibo como «Planer».",back:"← Atrás",retry:"Intentar de nuevo →",opening:"Abriendo el pago…",noSubj:"Falta la asignatura. Vuelve al chat y pulsa de nuevo la recarga.",errGen:"Algo salió mal. Inténtalo de nuevo en un minuto.",errNet:"Sin conexión con el servidor. Revisa tu internet e inténtalo de nuevo."},
    it:{eye:"Mathia · Ricarica",h1:"Continua con Profesorica",sub:"48 ore di conversazione con Profesorica per questa materia.",meta:"Dura 48h · solo Profesorica (non dispense/formule)",go:"Paga e continua →",fine:"Pagamento sicuro con carta tramite la banca. Sulla ricevuta appare come «Planer».",back:"← Indietro",retry:"Riprova →",opening:"Apertura pagamento…",noSubj:"Materia mancante. Torna alla chat e clicca di nuovo sulla ricarica.",errGen:"Qualcosa è andato storto. Riprova tra un minuto.",errNet:"Nessuna connessione al server. Controlla la rete e riprova."},
    ru:{eye:"Mathia · Пополнение",h1:"Продолжи с Profesorica",sub:"48 часов общения с Profesorica по этому предмету.",meta:"Действует 48ч · только Profesorica (без конспектов/формул)",go:"Оплатить и продолжить →",fine:"Безопасная оплата картой через банк. В чеке отображается как «Planer».",back:"← Назад",retry:"Попробовать снова →",opening:"Открываем оплату…",noSubj:"Не указан предмет. Вернись в чат и снова нажми на пополнение.",errGen:"Что-то пошло не так. Попробуй через минуту.",errNet:"Нет связи с сервером. Проверь интернет и попробуй снова."},
    pt:{eye:"Mathia · Recarga",h1:"Continua com a Profesorica",sub:"48 horas de conversa com a Profesorica para esta disciplina.",meta:"Dura 48h · só a Profesorica (não apontamentos/fórmulas)",go:"Pagar e continuar →",fine:"Pagamento seguro por cartão através do banco. Aparece no recibo como «Planer».",back:"← Voltar",retry:"Tentar de novo →",opening:"A abrir o pagamento…",noSubj:"Falta a disciplina. Volta ao chat e clica novamente na recarga.",errGen:"Algo correu mal. Tenta de novo daqui a um minuto.",errNet:"Sem ligação ao servidor. Verifica a internet e tenta de novo."}
  };
  function q(id){ return document.getElementById(id); }
  function lang(){ try{ return (localStorage.getItem('mathia_lang')||'sr').slice(0,2).toLowerCase(); }catch(e){ return 'sr'; } }
  function tr(){ return T[lang()] || T.sr; }
  var t = tr();

  // primeni jezik na vidljive tekstove
  (function applyLang(){
    q('eye').textContent = t.eye; q('h1').textContent = t.h1; q('sub').textContent = t.sub;
    q('meta').textContent = t.meta; q('go').textContent = t.go; q('fine').textContent = t.fine; q('back').textContent = t.back;
    try{ document.documentElement.lang = (lang()==='sr') ? 'sr-Latn' : lang(); }catch(e){}
  })();

  function subject(){ return decodeURIComponent((location.hash||'').replace(/^#/,'')).trim(); }
  function sbToken(){
    try{
      for(var i=0;i<localStorage.length;i++){
        var k=localStorage.key(i);
        if(k && /^sb-.*-auth-token$/.test(k)){
          var raw=localStorage.getItem(k); if(!raw) continue;
          var v=JSON.parse(raw);
          var tk=v && (v.access_token || (v.currentSession && v.currentSession.access_token) || (v.session && v.session.access_token));
          if(tk) return tk;
        }
      }
    }catch(e){}
    return '';
  }
  function showErr(msg){ var e=q('err'); e.textContent=msg; e.style.display='block'; q('spin').style.display='none'; q('go').disabled=false; q('go').textContent=t.retry; }

  var pred = subject();
  if(!pred){ showErr(t.noSubj); q('go').disabled=true; }

  async function start(){
    var tok = sbToken();
    if(!tok){ location.href = 'nalog.html?next=' + encodeURIComponent('dopuna.html#'+pred); return; }
    q('go').disabled=true; q('go').textContent=t.opening; q('spin').style.display='block'; q('err').style.display='none';
    try{
      var r = await fetch('/api/pass-start', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ token: tok, mode: pred, lang: lang() })
      });
      var j = await r.json().catch(function(){ return {}; });
      if(r.status===401){ location.href = 'nalog.html?next=' + encodeURIComponent('dopuna.html#'+pred); return; }
      if(!r.ok || !j.paymentUrl){ showErr(j.greska || t.errGen); return; }
      location.href = j.paymentUrl;   // → pay-start → banka
    }catch(e){ showErr(t.errNet); }
  }

  q('go').addEventListener('click', start);
})();
</script>
</body>
</html>
