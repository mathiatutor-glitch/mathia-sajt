<style>
:root{--navy:#14223E;--navy2:#5a3f4a;--gold:#C2A14D;--golddk:#9c7838;--goldlt:#E6CE86;
  --cream:#FAF7F0;--card:#FFFFFF;--ink:#1A1F2B;--muted:#7C8190;--bord:#E9E1CD;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:var(--cream);}
.serif{font-family:'Cormorant Garamond',Georgia,serif;}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px;}
.langbar{background:#0F1A30;border-bottom:1px solid rgba(194,161,77,.3);}
.langbar .row{max-width:1080px;margin:0 auto;display:flex;justify-content:center;gap:6px;flex-wrap:wrap;padding:9px 22px;font-size:12.5px;font-weight:700;}
.lang{padding:3px 10px;border-radius:999px;cursor:pointer;color:#aeb7cc;transition:color .15s;}
.lang:hover{color:#fff;} .lang.on{background:var(--gold);color:#14223E;font-weight:900;}
.hero{background:radial-gradient(circle at 50% -28%,#27406e 0%,#5a3f4a 40%,#14223E 84%);color:#fff;text-align:center;
  padding:70px 22px 84px;position:relative;overflow:hidden;box-shadow:inset 0 -3px 0 var(--gold);}
.hero:before,.hero:after{content:"\2605";position:absolute;color:rgba(194,161,77,.10);font-size:160px;line-height:1;}
.hero:before{top:-8px;left:16px;} .hero:after{bottom:-48px;right:22px;font-size:210px;}
.brand{display:inline-flex;align-items:center;gap:14px;margin-bottom:26px;position:relative;}
.seal{width:58px;height:58px;border-radius:50%;background:radial-gradient(circle at 34% 30%,#F4E2A8,#C2A14D 56%,#8E7230);
  display:flex;align-items:center;justify-content:center;color:#14223E;font-weight:800;font-size:30px;
  font-family:'Cormorant Garamond',serif;box-shadow:0 8px 24px rgba(0,0,0,.42),0 0 0 4px rgba(230,206,134,.22);}
.wm{font-weight:900;font-size:30px;letter-spacing:.4px;} .wm .ia{color:var(--gold);}
.stars{color:var(--gold);letter-spacing:9px;font-size:14px;margin-bottom:18px;position:relative;}
.hero h1{font-size:52px;line-height:1.06;font-weight:800;margin-bottom:18px;position:relative;letter-spacing:-.5px;text-shadow:0 2px 20px rgba(0,0,0,.28);}
.hero h1 .g{color:var(--goldlt);}
.hero p.lead{font-size:18.5px;color:#dbe2ef;max-width:660px;margin:0 auto 32px;font-weight:500;position:relative;line-height:1.55;}
.cta{display:inline-flex;gap:14px;flex-wrap:wrap;justify-content:center;position:relative;}
.btn{display:inline-block;text-decoration:none;border-radius:13px;padding:15px 32px;font-weight:800;font-size:16px;transition:transform .15s,box-shadow .15s;cursor:pointer;}
.btn:hover{transform:translateY(-2px);}
.btn-gold{background:linear-gradient(135deg,#F0DCA0,#C2A14D 58%,#9c7838);color:#14223E;box-shadow:0 10px 28px rgba(156,126,51,.5);}
.btn-ghost{background:rgba(255,255,255,.06);color:#fff;border:1.5px solid rgba(230,206,134,.6);}
.btn-ghost:hover{background:rgba(255,255,255,.12);}
.offer{background:#0F1A30;color:#fff;text-align:center;padding:15px 22px;font-weight:700;font-size:15px;letter-spacing:.2px;}
.offer .star{color:var(--gold);} .offer b{background:linear-gradient(135deg,#E6CE86,#C2A14D);color:#14223E;padding:2px 9px;border-radius:7px;font-weight:800;}
.sec{padding:60px 0;}
.sec h2{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:800;text-align:center;position:relative;padding-bottom:14px;color:var(--navy);}
.sec h2:after{content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:64px;height:2px;background:linear-gradient(90deg,transparent,#C2A14D,transparent);}
.sec .sub{text-align:center;color:var(--muted);font-weight:500;font-size:16px;margin:16px 0 34px;font-style:italic;}
.ico{display:inline-flex;align-items:center;justify-content:center;width:58px;height:58px;border-radius:50%;
  background:linear-gradient(135deg,#FBF3DD,#F1E3BC);border:1px solid rgba(194,161,77,.45);box-shadow:0 4px 12px rgba(156,126,51,.16);}
.ico svg{width:26px;height:26px;}
.grid{text-align:center;font-size:0;}
.pillar{display:inline-block;width:23%;min-width:200px;margin:0 .9% 18px;vertical-align:top;text-align:center;font-size:14px;padding:8px 10px;}
@media(max-width:820px){.pillar{width:46%;margin-bottom:26px;}} @media(max-width:480px){.pillar{width:94%;}}
.pillar h3{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;margin:14px 0 6px;color:var(--navy);}
.pillar p{font-size:13.5px;color:var(--muted);font-weight:500;line-height:1.5;}
.card{display:inline-block;width:31.5%;min-width:230px;margin:0 .7% 18px;vertical-align:top;text-align:left;font-size:14px;
  background:var(--card);border:1px solid var(--bord);border-radius:18px;padding:24px;position:relative;
  box-shadow:0 4px 16px rgba(20,34,62,.05);transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease;}
@media(max-width:760px){.card{width:46%;}} @media(max-width:520px){.card{width:96%;}}
.card:not(.soon):hover{transform:translateY(-5px);box-shadow:0 18px 40px rgba(20,34,62,.13);border-color:var(--gold);}
.card .ico{width:50px;height:50px;margin-bottom:14px;} .card .ico svg{width:23px;height:23px;}
.card h3{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;margin:0 0 5px;color:var(--navy);}
.card p{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:12px;line-height:1.45;}
.card .go{font-size:13.5px;font-weight:800;color:var(--golddk);letter-spacing:.3px;}
.card.soon{opacity:.72;background:#FCFAF4;}
.soonbadge{position:absolute;top:18px;right:18px;background:#F2EEE2;color:var(--golddk);font-size:10.5px;font-weight:900;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.5px;}
.quizband{background:radial-gradient(circle at 50% 0,#27406e,#14223E 80%);border-radius:20px;padding:34px 24px;text-align:center;color:#fff;box-shadow:inset 0 0 0 1px rgba(194,161,77,.4);}
.quizband h2{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:800;margin-bottom:18px;color:#fff;}
.trust{text-align:center;padding:30px 22px;color:var(--golddk);font-weight:700;font-size:14px;letter-spacing:.4px;border-top:1px solid var(--bord);border-bottom:1px solid var(--bord);background:#fff;}
.foot{background:#0F1A30;color:#aeb7cc;text-align:center;padding:36px 22px;font-size:13px;font-weight:500;border-top:1px solid rgba(194,161,77,.3);}
.foot .wm{font-size:20px;color:#fff;margin-bottom:8px;}
.foot .disc{max-width:720px;margin:8px auto 0;line-height:1.6;}
a.card{text-decoration:none;color:var(--ink);}
html[dir="rtl"] .card{text-align:right;}
</style>
