<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathIA — Otkrij svoj smer na FTN-u</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{
    --navy1:#102540; --navy2:#0A1628; --navy3:#050A1A;
    --gold:#E7C76B; --gold-hi:#F8EAB6; --gold-lo:#C29A45;
    --cyan:#34C6E0; --ink:#dfe7f2; --muted:#8fa9c4; --line:#21344f;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Manrope',system-ui,sans-serif; color:var(--ink); min-height:100vh;
    background:radial-gradient(900px 500px at 50% -5%, var(--navy1) 0%, var(--navy2) 45%, var(--navy3) 100%);
    display:flex; justify-content:center; padding:32px 18px;
  }
  .wrap{ width:100%; max-width:560px; }
  .brand{ text-align:center; margin-bottom:8px; }
  .wordmark{
    font-family:'Cormorant Garamond',Georgia,serif; font-weight:600; font-size:40px; letter-spacing:.05em;
    background:linear-gradient(180deg,var(--gold-hi),var(--gold) 60%,var(--gold-lo));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:var(--gold);
  }
  h1{ font-family:'Cormorant Garamond',serif; font-weight:600; font-size:30px; text-align:center; margin:6px 0 4px; color:#f2f5fa;}
  .sub{ text-align:center; color:var(--muted); font-size:14px; margin-bottom:26px; }
  .card{ background:rgba(255,255,255,.035); border:1px solid var(--line); border-radius:18px; padding:24px 22px;}
  .progress{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.2em; color:var(--cyan); margin-bottom:14px; }
  .q{ font-size:19px; font-weight:600; line-height:1.4; margin-bottom:18px; color:#f2f5fa; }
  .opt{
    display:block; width:100%; text-align:left; background:rgba(255,255,255,.02); color:var(--ink);
    border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px;
    font-size:15px; font-family:'Manrope',sans-serif; cursor:pointer; transition:all .15s ease;
  }
  .opt:hover{ border-color:var(--cyan); background:rgba(52,198,224,.08); transform:translateY(-1px); }
  .badge{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.22em; color:var(--cyan); text-align:center; }
  .result-name{ font-family:'Cormorant Garamond',serif; font-weight:600; font-size:29px; text-align:center; color:var(--gold); margin:6px 0 6px; line-height:1.15;}
  .result-desc{ text-align:center; color:var(--ink); font-size:15px; line-height:1.6; margin-bottom:8px;}
  .tag{ display:inline-block; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.06em;
        border:1px solid var(--line); border-radius:100px; padding:5px 12px; color:var(--muted); margin:4px auto 0;}
  .tag-wrap{ text-align:center; margin-bottom:20px;}
  .alts-title{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.2em; color:var(--muted); margin:22px 0 10px; text-transform:uppercase;}
  .alt{ border-top:1px solid var(--line); padding:13px 0; }
  .alt b{ color:#f2f5fa; font-weight:600;} .alt span{ color:var(--muted); font-size:13.5px;}
  .cta{ margin-top:22px; }
  a.btn,button.btn{
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    text-decoration:none; font-weight:600; font-size:16px; padding:15px 18px; border-radius:13px;
    border:none; cursor:pointer; transition:all .18s ease; font-family:'Manrope',sans-serif; margin-bottom:11px;
  }
  .btn-primary{ background:linear-gradient(180deg,var(--gold-hi),var(--gold) 65%,var(--gold-lo)); color:var(--navy3); box-shadow:0 8px 24px rgba(231,199,107,.2);}
  .btn-primary:hover{ transform:translateY(-2px);}
  .btn-ghost{ background:rgba(255,255,255,.03); color:var(--ink); border:1px solid var(--line);}
  .btn-ghost:hover{ border-color:var(--cyan); color:#fff;}
  .cta-note{ text-align:center; color:var(--muted); font-size:13px; margin:4px 0 0; line-height:1.5;}
  .foot{ text-align:center; margin-top:20px; font-size:12px; color:#566b88; line-height:1.6;}
  .foot a{ color:var(--muted);}
  .lang{ position:fixed; top:18px; right:20px; font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.1em; }
  .lang a{ color:var(--muted); text-decoration:none; padding:2px 4px; transition:color .15s ease; }
  .lang a.active{ color:var(--gold); }
  .lang a:hover{ color:var(--cyan); }
  .lang span{ color:#566b88; }
</style>
</head>
<body>
<nav class="lang">
  <a href="kviz.html" class="active">SR</a><span>·</span><a href="quiz-en.html">EN</a>
</nav>
<div class="wrap">
  <div class="brand"><span class="wordmark">MathIA</span></div>
  <h1>Otkrij svoj smer na FTN-u</h1>
  <p class="sub">Odgovori na 8 kratkih pitanja — predložićemo ti smer i alternative.</p>
  <div class="card" id="card"></div>
  <p class="foot">Orijentacioni vodič, ne i zvanična preporuka. Zvanični programi i uslovi upisa:
     <a href="https://ftn.uns.ac.rs/studijski-programi/" target="_blank" rel="noopener">ftn.uns.ac.rs</a></p>
</div>

<script>
const VISIBOOK = "https://visibook.com/psatlura5dcepnnrr";

/* Svi smerovi osnovnih akademskih studija FTN-a, sa tematskim oznakama (tags) i tipom prijemnog */
const SMEROVI = {
  PM:  {name:"Proizvodno mašinstvo", tags:["MASH"], prijemni:"matematika", desc:"Tehnologije izrade, mašine alatke i proizvodni procesi."},
  MKM: {name:"Mehanizacija i konstrukciono mašinstvo", tags:["MASH"], prijemni:"matematika", desc:"Mašinske konstrukcije, transportni sistemi i mehanizacija."},
  EPT: {name:"Energetika i procesna tehnika", tags:["MASH","ENERG"], prijemni:"matematika", desc:"Toplotna i procesna tehnika, energetski sistemi."},
  TMD: {name:"Tehnička mehanika i dizajn u tehnici", tags:["MASH","DIZ"], prijemni:"matematika", desc:"Inženjerska mehanika i dizajn tehničkih proizvoda."},
  EET: {name:"Energetika, elektronika i telekomunikacije", tags:["ELEK"], prijemni:"matematika", desc:"Struja, elektronika, telekomunikacije i merno-informacioni sistemi."},
  PSI: {name:"Primenjeno softversko inženjerstvo", tags:["SOFT","ELEK"], prijemni:"matematika", desc:"Softver za elektroenergetske i tehničke sisteme."},
  MR:  {name:"Merenje i regulacija", tags:["ELEK","AI"], prijemni:"matematika", desc:"Merna tehnika, senzori i automatska regulacija."},
  RA:  {name:"Računarstvo i automatika", tags:["SOFT","AI"], prijemni:"matematika", desc:"Programiranje, veštačka inteligencija, robotika i upravljanje."},
  SIIT:{name:"Softversko inženjerstvo i informacione tehnologije", tags:["SOFT"], prijemni:"matematika", desc:"Razvoj softvera, veb i mobilnih aplikacija (Novi Sad i Loznica)."},
  GRA: {name:"Građevinarstvo", tags:["GRAD"], prijemni:"matematika", desc:"Projektovanje i gradnja objekata, mostova i infrastrukture (Novi Sad i Kragujevac)."},
  ST:  {name:"Saobraćaj i transport", tags:["SAOB"], prijemni:"matematika", desc:"Drumski, transportni i logistički sistemi."},
  PST: {name:"Poštanski saobraćaj i telekomunikacije", tags:["SAOB","ELEK"], prijemni:"matematika", desc:"Poštanski i telekomunikacioni sistemi i mreže."},
  ARH: {name:"Arhitektura", tags:["DIZ","GRAD"], prijemni:"sklonosti", desc:"Projektovanje zgrada, prostora i gradova."},
  II:  {name:"Industrijsko inženjerstvo", tags:["MENADZ","MASH"], prijemni:"matematika", desc:"Optimizacija proizvodnje, kvalitet i logistika."},
  IM:  {name:"Inženjerski menadžment", tags:["MENADZ"], prijemni:"matematika", desc:"Spoj inženjerstva, ekonomije i upravljanja."},
  IIS: {name:"Inženjerstvo informacionih sistema", tags:["MENADZ","SOFT"], prijemni:"matematika", desc:"Informacioni sistemi u poslovanju i proizvodnji."},
  IZZS:{name:"Inženjerstvo zaštite životne sredine", tags:["EKO"], prijemni:"sklonosti", desc:"Zaštita vode, vazduha i zemljišta, održivost."},
  IZNR:{name:"Inženjerstvo zaštite na radu", tags:["EKO"], prijemni:"sklonosti", desc:"Bezbednost i zdravlje na radu, procena rizika."},
  URK: {name:"Upravljanje rizikom od katastrofalnih događaja i požara", tags:["EKO"], prijemni:"sklonosti", desc:"Zaštita od požara i upravljanje vanrednim situacijama."},
  GEO: {name:"Geodezija i geoinformatika", tags:["GRAD"], prijemni:"matematika", desc:"Merenja, mape, GIS i geoinformatika."},
  GID: {name:"Grafičko inženjerstvo i dizajn", tags:["DIZ"], prijemni:"sklonosti", desc:"Dizajn, štampa, multimedija i vizuelne komunikacije."},
  MEH: {name:"Mehatronika", tags:["AI","MASH","ELEK"], prijemni:"matematika", desc:"Spoj mašinstva, elektronike i automatike — roboti i pametni sistemi."},
  ANI: {name:"Animacija u inženjerstvu", tags:["DIZ","SOFT"], prijemni:"matematika", desc:"Računarska grafika, animacija i vizuelni efekti."},
  BIO: {name:"Biomedicinsko inženjerstvo", tags:["BIO","ELEK"], prijemni:"matematika", desc:"Tehnologija u medicini — uređaji i biomedicinski sistemi."},
  CET: {name:"Čiste energetske tehnologije", tags:["ENERG","EKO"], prijemni:"matematika", desc:"Obnovljivi izvori i održive energetske tehnologije."},
  SAT: {name:"Scenska arhitektura, tehnika i dizajn", tags:["DIZ"], prijemni:"sklonosti", desc:"Dizajn scenskog prostora, pozorišne i filmske tehnike."},
  INF: {name:"Informacioni inženjering", tags:["SOFT","MENADZ"], prijemni:"matematika", desc:"Inženjering informacionih i komunikacionih tehnologija."}
};

const QUESTIONS = [
  {q:"Šta te najviše zanima?", o:[
    {t:"Računari, softver i aplikacije", s:{SOFT:3, AI:1}},
    {t:"Struja, elektronika i telekomunikacije", s:{ELEK:3}},
    {t:"Mašine, motori i mehanika", s:{MASH:3}},
    {t:"Građevine, mostovi i prostor", s:{GRAD:3}},
    {t:"Dizajn, umetnost i vizuelno stvaranje", s:{DIZ:3}},
    {t:"Priroda, zaštita i bezbednost", s:{EKO:3}}
  ]},
  {q:"Omiljeni predmet u školi?", o:[
    {t:"Matematika i informatika", s:{SOFT:2, AI:2}},
    {t:"Fizika", s:{ELEK:2, MASH:2}},
    {t:"Likovno i tehničko crtanje", s:{DIZ:2, GRAD:1}},
    {t:"Biologija i hemija", s:{EKO:2, BIO:2}},
    {t:"Geografija", s:{GRAD:1, SAOB:1}}
  ]},
  {q:"Posao iz snova?", o:[
    {t:"Razvijam softver i veštačku inteligenciju", s:{SOFT:3, AI:2}},
    {t:"Projektujem elektroniku i sisteme", s:{ELEK:3, AI:1}},
    {t:"Konstruišem mašine i uređaje", s:{MASH:3}},
    {t:"Gradim objekte i infrastrukturu", s:{GRAD:3}},
    {t:"Vodim timove i organizujem proizvodnju", s:{MENADZ:3}},
    {t:"Kreiram vizuelni i digitalni sadržaj", s:{DIZ:3}},
    {t:"Spajam tehnologiju i zdravlje", s:{BIO:3}}
  ]},
  {q:"Koliko voliš matematiku?", o:[
    {t:"Veoma — to mi je jača strana", s:{SOFT:1, ELEK:1, MASH:1, GRAD:1, AI:1}},
    {t:"Solidno, snalazim se", s:{MENADZ:1, MASH:1, SAOB:1}},
    {t:"Više volim kreativan i praktičan rad", s:{DIZ:2}}
  ]},
  {q:"Kako najradije radiš?", o:[
    {t:"Sam/a, na rešavanju problema", s:{SOFT:2, AI:1}},
    {t:"U timu, koordiniram i organizujem", s:{MENADZ:2, SAOB:1}},
    {t:"Praktično, u laboratoriji ili radionici", s:{MASH:2, ELEK:1, BIO:1}},
    {t:"Kreativno, stvaram nešto vizuelno", s:{DIZ:2}}
  ]},
  {q:"Koja oblast budućnosti te najviše privlači?", o:[
    {t:"Veštačka inteligencija i softver", s:{SOFT:2, AI:2}},
    {t:"Energetika i elektronika", s:{ELEK:2, ENERG:1}},
    {t:"Robotika i automatizacija", s:{AI:2, MASH:1}},
    {t:"Zelene i održive tehnologije", s:{ENERG:2, EKO:2}},
    {t:"Dizajn, animacija i mediji", s:{DIZ:2}},
    {t:"Saobraćaj i logistika", s:{SAOB:3}}
  ]},
  {q:"Šta ti je najvažnije u budućem poslu?", o:[
    {t:"Stalne inovacije i nove tehnologije", s:{SOFT:1, AI:1, ELEK:1}},
    {t:"Stabilnost i jasna struktura", s:{GRAD:1, MENADZ:1}},
    {t:"Rad sa ljudima i organizacija", s:{MENADZ:2}},
    {t:"Doprinos zajednici i okolini", s:{EKO:2, BIO:1, ENERG:1}}
  ]},
  {q:"Koji projekat bi najradije radio/la?", o:[
    {t:"Mobilna ili veb aplikacija", s:{SOFT:3}},
    {t:"Pametan uređaj ili robot", s:{AI:2, ELEK:1, MASH:1}},
    {t:"Most, zgrada ili put", s:{GRAD:2, SAOB:1}},
    {t:"Sistem za fabriku ili logistiku", s:{MENADZ:2, MASH:1}},
    {t:"Vizuelni identitet ili animacija", s:{DIZ:3}},
    {t:"Rešenje za čistiju okolinu", s:{EKO:2, ENERG:1}}
  ]}
];

let step = 0;
let tagScores = {};
const card = document.getElementById('card');

function renderQuestion(){
  const Q = QUESTIONS[step];
  let html = '<div class="progress">PITANJE ' + (step+1) + ' / ' + QUESTIONS.length + '</div>';
  html += '<div class="q">' + Q.q + '</div>';
  Q.o.forEach(function(opt,i){ html += '<button class="opt" data-i="'+i+'">'+opt.t+'</button>'; });
  card.innerHTML = html;
  card.querySelectorAll('.opt').forEach(function(b){
    b.addEventListener('click', function(){
      const opt = Q.o[b.dataset.i];
      for(const k in opt.s){ tagScores[k] = (tagScores[k]||0) + opt.s[k]; }
      step++;
      if(step < QUESTIONS.length){ renderQuestion(); } else { renderResult(); }
    });
  });
}

function renderResult(){
  const keys = Object.keys(SMEROVI);
  const ranked = keys.map(function(k,idx){
    let s = 0;
    SMEROVI[k].tags.forEach(function(t){ s += (tagScores[t]||0); });
    const v = s / SMEROVI[k].tags.length + s * 0.0001; // prosek poklapanja, mali zbir kao razrešilac nereših
    return {k:k, v:v, idx:idx};
  }).sort(function(a,b){ return b.v - a.v || a.idx - b.idx; });

  const top  = SMEROVI[ranked[0].k];
  const alt1 = SMEROVI[ranked[1].k];
  const alt2 = SMEROVI[ranked[2].k];
  const alt3 = SMEROVI[ranked[3].k];

  const prijemniLabel = top.prijemni === "matematika"
      ? "Prijemni: matematika" : "Prijemni: test sklonosti";

  let ctaBlock;
  if(top.prijemni === "matematika"){
    ctaBlock =
      '<div class="cta">' +
        '<a class="btn btn-primary" href="'+VISIBOOK+'" target="_blank" rel="noopener">Zakaži čas — spremi prijemni →</a>' +
        '<p class="cta-note">Prijemni za ovaj smer je iz matematike (proveri tačan sadržaj na FTN-u). Spremaj se uz MathIA — privatno ili grupno, online ili uživo.</p>' +
      '</div>';
  } else {
    ctaBlock =
      '<div class="cta">' +
        '<a class="btn btn-primary" href="'+VISIBOOK+'" target="_blank" rel="noopener">Zakaži čas →</a>' +
        '<p class="cta-note">Ovaj smer ima test sklonosti — proveri uslove na sajtu FTN-a. Ako ti zatreba i matematika, MathIA je tu.</p>' +
      '</div>';
  }

  card.innerHTML =
    '<div class="badge">TVOJ SMER</div>' +
    '<div class="result-name">' + top.name + '</div>' +
    '<div class="result-desc">' + top.desc + '</div>' +
    '<div class="tag-wrap"><span class="tag">' + prijemniLabel + '</span></div>' +
    '<div class="alts-title">Alternative koje bi ti mogle leći</div>' +
    '<div class="alt"><b>'+alt1.name+'</b><br><span>'+alt1.desc+'</span></div>' +
    '<div class="alt"><b>'+alt2.name+'</b><br><span>'+alt2.desc+'</span></div>' +
    '<div class="alt"><b>'+alt3.name+'</b><br><span>'+alt3.desc+'</span></div>' +
    ctaBlock +
    '<button class="btn btn-ghost" onclick="restart()">↺ Uradi ponovo</button>';
}

function restart(){ step=0; tagScores={}; renderQuestion(); }
renderQuestion();
</script>
</body>
</html>
