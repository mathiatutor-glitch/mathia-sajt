<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathIA — Which university is for you?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{ --navy1:#102540; --navy2:#0A1628; --navy3:#050A1A; --gold:#E7C76B; --gold-hi:#F8EAB6; --gold-lo:#C29A45; --cyan:#34C6E0; --ink:#dfe7f2; --muted:#8fa9c4; --line:#21344f; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ font-family:'Manrope',system-ui,sans-serif; color:var(--ink); min-height:100vh; background:radial-gradient(900px 500px at 50% -5%, var(--navy1) 0%, var(--navy2) 45%, var(--navy3) 100%); display:flex; justify-content:center; padding:32px 18px; }
  .wrap{ width:100%; max-width:560px; }
  .brand{ text-align:center; margin-bottom:8px; }
  .wordmark{ font-family:'Cormorant Garamond',Georgia,serif; font-weight:600; font-size:40px; letter-spacing:.05em; background:linear-gradient(180deg,var(--gold-hi),var(--gold) 60%,var(--gold-lo)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:var(--gold); }
  h1{ font-family:'Cormorant Garamond',serif; font-weight:600; font-size:30px; text-align:center; margin:6px 0 4px; color:#f2f5fa;}
  .sub{ text-align:center; color:var(--muted); font-size:14px; margin-bottom:26px; }
  .card{ background:rgba(255,255,255,.035); border:1px solid var(--line); border-radius:18px; padding:24px 22px;}
  .progress{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.2em; color:var(--cyan); margin-bottom:14px; }
  .q{ font-size:19px; font-weight:600; line-height:1.4; margin-bottom:18px; color:#f2f5fa; }
  .opt{ display:block; width:100%; text-align:left; background:rgba(255,255,255,.02); color:var(--ink); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px; font-size:15px; font-family:'Manrope',sans-serif; cursor:pointer; transition:all .15s ease; }
  .opt:hover{ border-color:var(--cyan); background:rgba(52,198,224,.08); transform:translateY(-1px); }
  .badge{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.22em; color:var(--cyan); text-align:center; }
  .result-name{ font-family:'Cormorant Garamond',serif; font-weight:600; font-size:29px; text-align:center; color:var(--gold); margin:6px 0 6px; line-height:1.15;}
  .result-desc{ text-align:center; color:var(--ink); font-size:15px; line-height:1.6; margin-bottom:8px;}
  .tag{ display:inline-block; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.06em; border:1px solid var(--line); border-radius:100px; padding:5px 12px; color:var(--muted); margin:4px auto 0;}
  .tag-wrap{ text-align:center; margin-bottom:20px;}
  .alts-title{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.2em; color:var(--muted); margin:22px 0 10px; text-transform:uppercase;}
  .alt{ border-top:1px solid var(--line); padding:13px 0; }
  .alt b{ color:#f2f5fa; font-weight:600;} .alt span{ color:var(--muted); font-size:13.5px;}
  .cta{ margin-top:22px; }
  a.btn,button.btn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; text-decoration:none; font-weight:600; font-size:16px; padding:15px 18px; border-radius:13px; border:none; cursor:pointer; transition:all .18s ease; font-family:'Manrope',sans-serif; margin-bottom:11px; }
  .btn-primary{ background:linear-gradient(180deg,var(--gold-hi),var(--gold) 65%,var(--gold-lo)); color:var(--navy3); box-shadow:0 8px 24px rgba(231,199,107,.2);}
  .btn-primary:hover{ transform:translateY(-2px);}
  .btn-ghost{ background:rgba(255,255,255,.03); color:var(--ink); border:1px solid var(--line);}
  .btn-ghost:hover{ border-color:var(--cyan); color:#fff;}
  .cta-note{ text-align:center; color:var(--muted); font-size:13px; margin:4px 0 0; line-height:1.5;}
  .foot{ text-align:center; margin-top:20px; font-size:12px; color:#566b88; line-height:1.6;}
  .foot a{ color:var(--muted);}
  .lang{ position:fixed; top:18px; right:20px; font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.1em; }
  .lang a{ color:var(--muted); text-decoration:none; padding:2px 4px; transition:color .15s ease; }
  .lang a.active{ color:var(--gold); } .lang a:hover{ color:var(--cyan); } .lang span{ color:#566b88; }
</style>
</head>
<body>
<nav class="lang">
  <a href="vodic-fakultet.html">SR</a><span>·</span><a href="vodic-fakultet-en.html" class="active">EN</a>
</nav>
<div class="wrap">
  <div class="brand"><span class="wordmark">MathIA</span></div>
  <h1>Which university is for you?</h1>
  <p class="sub">Answer 8 short questions — we'll suggest a field and faculties in Novi Sad and Belgrade.</p>
  <div class="card" id="card"></div>
  <p class="foot">An orientation guide, not an official recommendation. Official admission requirements:
     <a href="https://www.uns.ac.rs" target="_blank" rel="noopener">uns.ac.rs</a> and
     <a href="https://www.bg.ac.rs" target="_blank" rel="noopener">bg.ac.rs</a></p>
</div>

<script>
const VISIBOOK = "https://visibook.com/psatlura5dcepnnrr";

const OBLASTI = {
  TEH:  {name:"Engineering & technology", tags:["TEH","MAT"], mat:true,  desc:"Mechanical, electrical and mechatronics engineering. Novi Sad: FTN. Belgrade: ETF, Faculty of Mechanical Engineering, Faculty of Civil Engineering."},
  IT:   {name:"Computing & software", tags:["IT","MAT"], mat:true,  desc:"Programming, software and artificial intelligence. Novi Sad: FTN (Computing, Software Eng.), PMF. Belgrade: ETF, Faculty of Mathematics, RAF."},
  MATF: {name:"Mathematics & physics", tags:["MAT","NAUKA"], mat:true,  desc:"Pure and applied mathematics and physics. Novi Sad: PMF (Faculty of Sciences). Belgrade: Faculty of Mathematics, Faculty of Physics."},
  PRIR: {name:"Biology, chemistry & life sciences", tags:["PRIRODA","NAUKA"], mat:false, desc:"Biology, chemistry, ecology. Novi Sad: PMF, Faculty of Technology. Belgrade: Faculty of Biology, Faculty of Chemistry."},
  MED:  {name:"Medicine & health", tags:["MED","PRIRODA"], mat:false, desc:"Medicine, dentistry, pharmacy. Novi Sad: Faculty of Medicine. Belgrade: Faculties of Medicine, Dentistry and Pharmacy."},
  EKON: {name:"Economics & business", tags:["EKON","ORG"], mat:false, desc:"Economics, finance, management. Novi Sad: Faculty of Economics (Subotica/Novi Sad). Belgrade: Faculty of Economics, FON."},
  PRAVO:{name:"Law", tags:["PRAVO","DRUST"], mat:false, desc:"Law, judiciary and administration. Novi Sad: Faculty of Law. Belgrade: Faculty of Law."},
  DRUST:{name:"Social sciences & psychology", tags:["DRUST"], mat:false, desc:"Psychology, sociology, political science. Novi Sad: Faculty of Philosophy. Belgrade: Faculty of Philosophy, FPN."},
  JEZIK:{name:"Languages & philology", tags:["JEZIK","DRUST"], mat:false, desc:"Foreign languages, literature and translation. Novi Sad: Faculty of Philosophy. Belgrade: Faculty of Philology."},
  UMETL:{name:"Fine arts & design", tags:["UMET","DIZ"], mat:false, desc:"Painting, design, applied arts. Novi Sad: Academy of Arts. Belgrade: FLU, FPU."},
  UMETS:{name:"Music, acting & stage", tags:["UMET","SCENA"], mat:false, desc:"Music, acting and dramatic arts. Novi Sad: Academy of Arts. Belgrade: FMU (music), FDU (drama & film)."},
  ARHG: {name:"Architecture & civil engineering", tags:["TEH","DIZ"], mat:true, desc:"Designing buildings, spaces and cities. Novi Sad: FTN (Architecture, Civil Eng.). Belgrade: Faculty of Architecture, Faculty of Civil Engineering."},
  ORG:  {name:"Management & organization", tags:["ORG","EKON"], mat:false, desc:"Organization, management, information systems. Novi Sad: FTN (Engineering Management). Belgrade: FON."},
  POLJ: {name:"Agriculture & biotechnology", tags:["PRIRODA","NAUKA"], mat:false, desc:"Agriculture and food technology. Novi Sad: Faculty of Agriculture, Faculty of Technology. Belgrade: Faculty of Agriculture (Zemun)."},
  SPORT:{name:"Sport & physical education", tags:["SPORT"], mat:false, desc:"Sport, coaching and physical education. Novi Sad and Belgrade: Faculty of Sport and Physical Education."},
  SAOB: {name:"Transport & logistics", tags:["TEH","ORG"], mat:true, desc:"Traffic, transport and logistics. Novi Sad: FTN (Traffic). Belgrade: Faculty of Transport and Traffic Engineering."},
  MEDIJ:{name:"Media & communications", tags:["DRUST","JEZIK"], mat:false, desc:"Journalism, media and communications. Novi Sad: Faculty of Philosophy. Belgrade: FPN (journalism & communication)."}
};

const QUESTIONS = [
  {q:"What attracts you most?", o:[
    {t:"Technology, machines and how things work", s:{TEH:3, MAT:1}},
    {t:"Computers, software and technology", s:{IT:3, MAT:1}},
    {t:"Nature, the body and health", s:{PRIRODA:2, MED:2}},
    {t:"People, society and how the world works", s:{DRUST:3}},
    {t:"Art, design and creating", s:{UMET:2, DIZ:1}},
    {t:"Money, business and organization", s:{EKON:2, ORG:2}}
  ]},
  {q:"Favorite subject in school?", o:[
    {t:"Mathematics", s:{MAT:3, IT:1, TEH:1}},
    {t:"Physics", s:{TEH:2, MAT:1, NAUKA:1}},
    {t:"Biology or chemistry", s:{PRIRODA:2, MED:2, NAUKA:1}},
    {t:"Native or foreign languages", s:{JEZIK:3}},
    {t:"History or sociology", s:{DRUST:2, PRAVO:1}},
    {t:"Art or music", s:{UMET:2, DIZ:1, SCENA:1}}
  ]},
  {q:"Your dream job?", o:[
    {t:"Engineer or programmer", s:{TEH:2, IT:2, MAT:1}},
    {t:"Doctor or science researcher", s:{MED:3, PRIRODA:1, NAUKA:1}},
    {t:"Lawyer, judge or in administration", s:{PRAVO:3, DRUST:1}},
    {t:"Entrepreneur or manager", s:{EKON:2, ORG:2}},
    {t:"Artist, designer or musician", s:{UMET:2, DIZ:1, SCENA:1}},
    {t:"Psychologist, teacher or journalist", s:{DRUST:2, JEZIK:1}}
  ]},
  {q:"How much do you like mathematics?", o:[
    {t:"A lot — it's my strong suit", s:{MAT:2, TEH:1, IT:1}},
    {t:"It's fine, I manage", s:{EKON:1, ORG:1, NAUKA:1}},
    {t:"I prefer languages and humanities", s:{JEZIK:1, DRUST:1}},
    {t:"I prefer creative work", s:{UMET:1, DIZ:1}}
  ]},
  {q:"How do you prefer to work?", o:[
    {t:"Solving problems and logical tasks", s:{MAT:1, IT:2, TEH:1}},
    {t:"Working with people", s:{DRUST:2, MED:1, ORG:1}},
    {t:"Hands-on, in a lab or in the field", s:{PRIRODA:1, TEH:1, MED:1}},
    {t:"Creatively and visually", s:{UMET:2, DIZ:1}},
    {t:"Organizing and leading", s:{ORG:2, EKON:1}}
  ]},
  {q:"What matters to you in a job?", o:[
    {t:"Innovation and technology", s:{IT:1, TEH:1, MAT:1}},
    {t:"Helping people", s:{MED:2, DRUST:1}},
    {t:"Stability and prestige", s:{PRAVO:2, EKON:1}},
    {t:"Freedom and creativity", s:{UMET:2, DIZ:1}},
    {t:"Earnings and advancement", s:{EKON:2, ORG:1}}
  ]},
  {q:"Which field of the future attracts you?", o:[
    {t:"Artificial intelligence and IT", s:{IT:2, MAT:1}},
    {t:"Medicine and biotechnology", s:{MED:2, PRIRODA:1}},
    {t:"Green energy and ecology", s:{NAUKA:1, PRIRODA:1, TEH:1}},
    {t:"Media, marketing and communications", s:{DRUST:1, JEZIK:1, ORG:1}},
    {t:"Design, film and video games", s:{DIZ:2, UMET:1, IT:1}},
    {t:"Sport and health", s:{SPORT:3}}
  ]},
  {q:"Which environment suits you best?", o:[
    {t:"Lab, workshop or construction site", s:{TEH:2, NAUKA:1}},
    {t:"Hospital or clinic", s:{MED:3}},
    {t:"Office, court or company", s:{PRAVO:1, EKON:1, ORG:1}},
    {t:"Studio, stage or atelier", s:{UMET:1, DIZ:1, SCENA:1}},
    {t:"Classroom, newsroom or institute", s:{DRUST:1, JEZIK:1, NAUKA:1}},
    {t:"Field, gym or nature", s:{SPORT:2, PRIRODA:1}}
  ]}
];

let step = 0, tagScores = {};
const card = document.getElementById('card');

function renderQuestion(){
  const Q = QUESTIONS[step];
  let html = '<div class="progress">QUESTION ' + (step+1) + ' / ' + QUESTIONS.length + '</div>';
  html += '<div class="q">' + Q.q + '</div>';
  Q.o.forEach(function(opt,i){ html += '<button class="opt" data-i="'+i+'">'+opt.t+'</button>'; });
  card.innerHTML = html;
  card.querySelectorAll('.opt').forEach(function(b){
    b.addEventListener('click', function(){
      const opt = Q.o[b.dataset.i];
      for(const k in opt.s){ tagScores[k] = (tagScores[k]||0) + opt.s[k]; }
      step++;
      if(step < QUESTIONS.length){ renderQuestion(); } else { renderResult(); }
    });
  });
}

function renderResult(){
  const keys = Object.keys(OBLASTI);
  const ranked = keys.map(function(k,idx){
    let s = 0; OBLASTI[k].tags.forEach(function(t){ s += (tagScores[t]||0); });
    const v = s / OBLASTI[k].tags.length + s * 0.0001;
    return {k:k, v:v, idx:idx};
  }).sort(function(a,b){ return b.v - a.v || a.idx - b.idx; });

  const top = OBLASTI[ranked[0].k], alt1 = OBLASTI[ranked[1].k], alt2 = OBLASTI[ranked[2].k], alt3 = OBLASTI[ranked[3].k];
  const pill = top.mat ? "The entrance exam usually includes mathematics/physics" : "Admission requirements vary by faculty";

  let ctaBlock;
  if(top.mat){
    ctaBlock = '<div class="cta"><a class="btn btn-primary" href="'+VISIBOOK+'" target="_blank" rel="noopener">Book a lesson — prep for the entrance exam →</a>' +
      '<p class="cta-note">For this field the entrance exam usually includes mathematics or physics. Prepare with MathIA — private or group, online or in person.</p></div>';
  } else {
    ctaBlock = '<div class="cta"><a class="btn btn-primary" href="'+VISIBOOK+'" target="_blank" rel="noopener">Book a lesson →</a>' +
      '<p class="cta-note">Admission requirements vary by faculty — check their website. If you need mathematics or physics, MathIA is here for you.</p></div>';
  }

  card.innerHTML =
    '<div class="badge">SUGGESTED FOR YOU</div>' +
    '<div class="result-name">' + top.name + '</div>' +
    '<div class="result-desc">' + top.desc + '</div>' +
    '<div class="tag-wrap"><span class="tag">' + pill + '</span></div>' +
    '<div class="alts-title">Alternatives that might suit you</div>' +
    '<div class="alt"><b>'+alt1.name+'</b><br><span>'+alt1.desc+'</span></div>' +
    '<div class="alt"><b>'+alt2.name+'</b><br><span>'+alt2.desc+'</span></div>' +
    '<div class="alt"><b>'+alt3.name+'</b><br><span>'+alt3.desc+'</span></div>' +
    ctaBlock +
    '<button class="btn btn-ghost" onclick="restart()">↺ Start over</button>';
}
function restart(){ step=0; tagScores={}; renderQuestion(); }
renderQuestion();
</script>
</body>
</html>
