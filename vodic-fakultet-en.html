<script>
const DATA={"ui": {"start": "Start the test", "back": "‹ Back", "q": "Question", "of": "of", "resultKicker": "Your result", "altTitle": "Great alternatives", "cta": "Book a lesson →", "restart": "Start over", "backSite": "‹ Back to site", "backHref": "en.html", "disc": "This guide narrows your options — it isn't the final decision."}, "meta": {"title": "Which faculty is right for you?", "badge": "Faculty guide", "subtitle": "A few questions and you get a faculty suggestion with alternatives — for Novi Sad and Belgrade.", "ctaHref": "https://visibook.com/psatlura5dcepnnrr"}, "outcomes": {"TEH": {"title": "Engineering & IT", "desc": "FTN, ETF, RAF or computing at the science faculty — software, engineering, IT. (Novi Sad / Belgrade)"}, "PRIR": {"title": "Natural Sciences", "desc": "Maths, physics, chemistry, biology — research and science."}, "MED": {"title": "Medicine & Biomedicine", "desc": "Medical school and biomedicine — working with people and health."}, "EKO": {"title": "Economics & Business", "desc": "Economics, management and entrepreneurship — markets and organization."}, "DRU": {"title": "Social Sciences & Humanities", "desc": "Law, psychology, languages, media — working with people and ideas."}, "UMD": {"title": "Art, Design & Architecture", "desc": "Art academy, design, architecture — creative professions."}}, "questions": [{"q": "What interests you most?", "options": [{"t": "Technology, computers, engineering", "s": {"TEH": 2}}, {"t": "How nature and numbers work", "s": {"PRIR": 2}}, {"t": "The human body and health", "s": {"MED": 2}}, {"t": "Money, markets, entrepreneurship", "s": {"EKO": 2}}]}, {"q": "Favourite subject?", "options": [{"t": "Maths / computer science", "s": {"TEH": 2, "PRIR": 1}}, {"t": "Physics / chemistry / biology", "s": {"PRIR": 2, "MED": 1}}, {"t": "Languages / history / psychology", "s": {"DRU": 2}}, {"t": "Art / design", "s": {"UMD": 2}}]}, {"q": "How would you like to work?", "options": [{"t": "Building systems and software", "s": {"TEH": 2}}, {"t": "Researching and discovering", "s": {"PRIR": 2, "MED": 1}}, {"t": "Helping people directly", "s": {"MED": 2, "DRU": 1}}, {"t": "Running a business or projects", "s": {"EKO": 2}}]}, {"q": "What matters to you at work?", "options": [{"t": "Innovation and logic", "s": {"TEH": 2}}, {"t": "Stability and science", "s": {"PRIR": 1, "MED": 1}}, {"t": "Contact with people", "s": {"DRU": 2, "MED": 1}}, {"t": "Earnings and opportunity", "s": {"EKO": 2}}]}, {"q": "Pick a task:", "options": [{"t": "Build an app or a machine", "s": {"TEH": 2}}, {"t": "Solve a complex scientific problem", "s": {"PRIR": 2}}, {"t": "Design a campaign or business plan", "s": {"EKO": 2, "DRU": 1}}, {"t": "Design a space or visual", "s": {"UMD": 2}}]}, {"q": "Where do you see yourself?", "options": [{"t": "IT or engineering", "s": {"TEH": 2}}, {"t": "Lab, research, clinic", "s": {"PRIR": 1, "MED": 2}}, {"t": "Company, bank, marketing", "s": {"EKO": 2}}, {"t": "Studio, atelier, office", "s": {"UMD": 2, "DRU": 1}}]}]};
const $=s=>document.querySelector(s);
let stage='intro',idx=0,scores={},hist=[];
const N=DATA.questions.length;
function prog(p){$('#prog').style.width=p+'%';}
function head(){$('#top').innerHTML=`<a class="brand" href="${DATA.ui.backHref}"><span class="badge"><b>M</b></span>Mathia</a><a class="back" href="${DATA.ui.backHref}">${DATA.ui.backSite}</a>`;
  $('#ftr').innerHTML=`Mathia · <a href="${DATA.ui.backHref}" style="color:var(--gold)">mathia.rs</a>`;}
function render(){
  const c=$('#card');
  if(stage==='intro'){prog(0);
    c.innerHTML=`<span class="kicker">◆ ${DATA.meta.badge}</span><h1>${DATA.meta.title}</h1><p class="lead">${DATA.meta.subtitle}</p><button class="cta" id="go">${DATA.ui.start}</button><p class="disc">${DATA.ui.disc}</p>`;
    $('#go').onclick=()=>{stage='quiz';idx=0;scores={};hist=[];render();window.scrollTo({top:0,behavior:'smooth'});};
  }else if(stage==='quiz'){const q=DATA.questions[idx];prog(Math.round(idx/N*100));
    c.innerHTML=`<div class="qmeta"><span>${DATA.ui.q} ${idx+1} ${DATA.ui.of} ${N}</span>${idx>0?`<button class="lnk" id="bk">${DATA.ui.back}</button>`:''}</div><h2 class="qh">${q.q}</h2><div class="opts">${q.options.map((o,i)=>`<button class="opt" data-i="${i}">${o.t}</button>`).join('')}</div>`;
    c.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{const o=q.options[+b.dataset.i];hist.push(JSON.stringify(scores));for(const k in o.s){scores[k]=(scores[k]||0)+o.s[k];}idx++;if(idx>=N)stage='result';render();window.scrollTo({top:0,behavior:'smooth'});});
    const bk=$('#bk');if(bk)bk.onclick=()=>{if(hist.length)scores=JSON.parse(hist.pop());idx=Math.max(0,idx-1);render();};
  }else{prog(100);
    const ranked=Object.keys(DATA.outcomes).sort((a,b)=>(scores[b]||0)-(scores[a]||0));
    const o=DATA.outcomes[ranked[0]];const alts=ranked.slice(1,3);
    c.innerHTML=`<span class="kicker">◆ ${DATA.ui.resultKicker}</span><h1>${o.title}</h1><p class="lead">${o.desc}</p>${o.exam?`<div class="exam">${o.exam}</div>`:''}<div class="alts"><h3>${DATA.ui.altTitle}</h3>${alts.map(k=>`<div class="alt"><b>${DATA.outcomes[k].title}</b></div>`).join('')}</div><a class="cta" href="${DATA.meta.ctaHref}" target="_blank" rel="noopener">${DATA.ui.cta}</a><button class="lnk restart" id="rs">${DATA.ui.restart}</button>`;
    $('#rs').onclick=()=>{stage='intro';render();window.scrollTo({top:0,behavior:'smooth'});};
  }
}
head();render();
</script>
